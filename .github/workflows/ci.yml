name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - name: D&D Change Guard
        if: github.event_name == 'pull_request'
        run: |
          DND_FILES=$(git diff origin/main --name-only | grep -E "(useCardDragDrop|useDragSelect|DraggableCard|SortableContext|DndContext|useDroppable|useSortable|SidebarHeatMinimap|collisionDetection|FloatingScratchPad|MandalaCell)" || true)
          if [ -n "$DND_FILES" ]; then
            echo "::warning::D&D CRITICAL FILES CHANGED — verify regression manually"
            echo "$DND_FILES"
            echo ""
            echo "Required: run dnd-smoke.spec.ts locally + browser manual verification"
            echo "History: D&D regression 3x (CP248, CP268, CP271)"
          fi

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Clean install (resolves platform-specific native binaries)
        run: cd frontend && npm install --no-package-lock --no-audit
      - run: cd frontend && npx vitest run

  hardcode-audit:
    name: Hardcode Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/audit/hardcode-audit.ts
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardcode-audit-report
          path: reports/hardcode-audit/latest.json
          retention-days: 30

  # Combined: test-backend + build-api (saves 1 npm ci)
  test-and-build-api:
    name: Test Backend & Build API
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx jest --testPathPattern=tests/smoke
      - run: npm run build

  # Combined: build-frontend + a11y (saves 1 npm install + 1 vite build)
  build-and-a11y-frontend:
    name: Build Frontend & Accessibility
    runs-on: ubuntu-latest
    needs: [test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd frontend && npm install --no-package-lock --no-audit
      - run: cd frontend && npx tsc --noEmit
      - run: cd frontend && npm run build
        env:
          VITE_API_URL: /api
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder
      - run: cd frontend && npx playwright install --with-deps chromium
      - name: Run axe accessibility tests
        run: cd frontend && npx playwright test tests/a11y.spec.ts --project=no-auth
