name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - name: D&D Change Guard
        if: github.event_name == 'pull_request'
        run: |
          DND_FILES=$(git diff origin/main --name-only | grep -E "(useCardDragDrop|useDragSelect|DraggableCard|SortableContext|DndContext|useDroppable|useSortable|SidebarHeatMinimap|collisionDetection|FloatingScratchPad|MandalaCell)" || true)
          if [ -n "$DND_FILES" ]; then
            echo "::warning::D&D CRITICAL FILES CHANGED — verify regression manually"
            echo "$DND_FILES"
            echo ""
            echo "Required: run dnd-smoke.spec.ts locally + browser manual verification"
            echo "History: D&D regression 3x (CP248, CP268, CP271)"
          fi

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx jest --testPathPattern=tests/smoke

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && rm -rf node_modules package-lock.json && npm install --no-audit
      - run: cd frontend && npx vitest run

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc --noEmit
      - run: cd frontend && npm run build
        env:
          VITE_API_URL: /api
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder

  a11y:
    name: Accessibility Check
    runs-on: ubuntu-latest
    needs: [build-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx playwright install --with-deps chromium
      - run: cd frontend && npm run build
        env:
          VITE_API_URL: /api
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder
      - name: Run axe accessibility tests
        run: cd frontend && npx playwright test tests/a11y.spec.ts --project=no-auth
