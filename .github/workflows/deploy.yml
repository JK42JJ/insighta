name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/jk42jj/insighta-api
  FRONTEND_IMAGE: ghcr.io/jk42jj/insighta-frontend

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api
            VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: [build-and-push]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Run migrations
        run: npx prisma migrate deploy || npx prisma db push --skip-generate --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [migrate]
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /opt/tubearchive

            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull

            # Save current image digests for rollback
            docker compose -f docker-compose.prod.yml images -q > /tmp/previous-images.txt 2>/dev/null || true

            # Deploy with zero-downtime
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for health check
            echo "Waiting for services to be healthy..."
            sleep 10

            RETRIES=6
            for i in $(seq 1 $RETRIES); do
              if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
                echo "Health check passed!"
                break
              fi
              if [ $i -eq $RETRIES ]; then
                echo "Health check failed after $RETRIES attempts. Rolling back..."
                docker compose -f docker-compose.prod.yml down
                docker compose -f docker-compose.prod.yml up -d
                exit 1
              fi
              echo "Attempt $i/$RETRIES - waiting..."
              sleep 10
            done

            # Cleanup old images
            docker image prune -f

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf https://${{ secrets.DOMAIN }}/health || echo "External health check pending (DNS may not be configured yet)"
