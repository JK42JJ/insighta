name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/jk42jj/insighta-api
  FRONTEND_IMAGE: ghcr.io/jk42jj/insighta-frontend
  FRONTEND_V2_IMAGE: ghcr.io/jk42jj/insighta-frontend-v2

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-edge-functions:
    name: Deploy Edge Functions
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in local-cards youtube-sync youtube-auth fetch-url-metadata; do
            echo "Deploying $fn..."
            supabase functions deploy "$fn" \
              --project-ref rckkhhjanqgaopynhfgd \
              --no-verify-jwt
          done

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api
            VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend V2 image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-v2
          push: true
          tags: |
            ${{ env.FRONTEND_V2_IMAGE }}:latest
            ${{ env.FRONTEND_V2_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=/api
            VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    name: Database Schema Sync
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Sync database schema
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    env:
      SG_ID: sg-079aa1ca6855e587b
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.TF_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.TF_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - uses: actions/checkout@v4

      - name: Open SSH for runner IP
        run: |
          RUNNER_IP=$(curl -s ifconfig.me)
          echo "RUNNER_IP=$RUNNER_IP" >> "$GITHUB_ENV"
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp --port 22 \
            --cidr "$RUNNER_IP/32" \
            --tag-specifications "ResourceType=security-group-rule,Tags=[{Key=Purpose,Value=github-actions-deploy}]"
          echo "Opened SSH for $RUNNER_IP"

      - name: Copy docker-compose.prod.yml to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/tubearchive/"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /opt/tubearchive

            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull

            # Save current image digests for rollback
            docker compose -f docker-compose.prod.yml images -q > /tmp/previous-images.txt 2>/dev/null || true

            # Deploy with zero-downtime
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for health check
            echo "Waiting for services to be healthy..."
            sleep 10

            RETRIES=6
            for i in $(seq 1 $RETRIES); do
              if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
                echo "Health check passed!"
                break
              fi
              if [ $i -eq $RETRIES ]; then
                echo "Health check failed after $RETRIES attempts. Rolling back..."
                docker compose -f docker-compose.prod.yml down
                docker compose -f docker-compose.prod.yml up -d
                exit 1
              fi
              echo "Attempt $i/$RETRIES - waiting..."
              sleep 10
            done

            # Cleanup old images
            docker image prune -f

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf https://${{ secrets.DOMAIN }}/health || echo "External health check pending (DNS may not be configured yet)"

      - name: Close SSH for runner IP
        if: always()
        run: |
          if [ -n "$RUNNER_IP" ]; then
            aws ec2 revoke-security-group-ingress \
              --group-id "$SG_ID" \
              --protocol tcp --port 22 \
              --cidr "$RUNNER_IP/32" 2>/dev/null || true
            echo "Closed SSH for $RUNNER_IP"
          fi
