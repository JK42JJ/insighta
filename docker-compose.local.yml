version: '3.9'

# =============================================================================
# TubeArchive - Local Development with Supabase
# =============================================================================
# Usage:
#   1. Ensure Supabase is running:
#      cd ~/cursor/superbase && docker compose -f docker-compose.dev.yml --env-file .env.dev up -d
#   2. Start TubeArchive:
#      ./scripts/dev-docker.sh start
#   Or manually:
#      docker compose -f docker-compose.local.yml up -d --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # API Server (Backend)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tubearchive-api-local
    restart: unless-stopped
    command: ["api"]
    ports:
      - "${API_PORT:-3000}:3000"
    env_file:
      - .env.docker.local
    environment:
      - NODE_ENV=development
      - API_HOST=0.0.0.0
      - CORS_ORIGIN=http://localhost:${FRONTEND_PORT:-8081},http://frontend:8081
      # Use db push for development instead of migrate deploy
      - SKIP_MIGRATIONS=true
    volumes:
      - cache_data:/app/cache
      - logs_data:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - supabase-dev_supabase-dev  # Join Supabase network for DB access
      - tubearchive-local

  # ---------------------------------------------------------------------------
  # Frontend (React/Vite with Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-http://localhost:8000}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzY2MjI3MDk2LCJleHAiOjE5MjM5MDcwOTZ9._PPvvvOcDKL3jmTJqVhstKC4g7fJg_EjjKDdQA43mSA}
        - VITE_APP_NAME=${VITE_APP_NAME:-TubeArchive (Docker Dev)}
        - VITE_APP_VERSION=${VITE_APP_VERSION:-1.0.0-dev}
    container_name: tubearchive-frontend-local
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8081}:8081"
    environment:
      - API_URL=http://api:3000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - supabase-dev_supabase-dev
      - tubearchive-local

  # ---------------------------------------------------------------------------
  # Scheduler Daemon (Optional)
  # ---------------------------------------------------------------------------
  # Uncomment to enable background sync scheduler
  # ---------------------------------------------------------------------------
  # scheduler:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: tubearchive-scheduler-local
  #   restart: unless-stopped
  #   command: ["scheduler"]
  #   env_file:
  #     - .env.docker.local
  #   environment:
  #     - NODE_ENV=development
  #     - SKIP_MIGRATIONS=true
  #   volumes:
  #     - cache_data:/app/cache
  #     - logs_data:/app/logs
  #   depends_on:
  #     api:
  #       condition: service_healthy
  #   networks:
  #     - supabase-dev_supabase-dev
  #     - tubearchive-local

# =============================================================================
# Volumes
# =============================================================================
volumes:
  cache_data:
    driver: local
  logs_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  # External network - Supabase dev environment
  # This network is created by Supabase docker-compose
  supabase-dev_supabase-dev:
    external: true
  # Internal network for TubeArchive services
  tubearchive-local:
    driver: bridge
