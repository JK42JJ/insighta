<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>다이얼 — Insighta</title>
<meta name="description" content="유튜브를 나만의 지식노트로 — 다이얼, Insighta 플레이어">
<link rel="manifest" href="/mobile/manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Insighta">
<meta name="theme-color" content="#F5F2EC">
<link rel="preconnect" href="https://www.youtube.com">
<link rel="preconnect" href="https://i.ytimg.com">
<link rel="preconnect" href="https://googlevideo.com">
<link rel="apple-touch-icon" href="/mobile/icon-180.png">
<link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="/mobile/splash-1125x2436.png">
<link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/mobile/splash-1170x2532.png">
<link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/mobile/splash-1290x2796.png">
<link rel="icon" type="image/png" sizes="192x192" href="/mobile/icon-192.png">
<style>
  /* ============ Insighta Player — 설계 명세 v1/v2 구현 ============
     SSOT: docs/design/mobile-player-spec-2026-07-13.md
     §1.1 휠 재제작 · §1.1a 조그 물성(J1~J8) · §1.1b 타이포 · §1.2 홈 상태머신
     §2 가로 무대(커버 크롭·헤어라인·A기록 게임핸들) · §6 G1~G4/C1~C7 · §7 M1~M4 · §8 S1~S4 */
  :root{
    --studio-hi:#F5F2EC; --studio-lo:#E6E1D6; --ink:#2C2925; --ink-2:#837D72; --hair:#DCD6CA;
    --paper:#F6F2E7; --paper-ink:#3B372F; --paper-sub:#8F887A;
    --butter:#F5D48A; --green:#34C759; --red:#FF3B30;
    /* S3: 물성 공통 토큰 — 전 표면 동일 계열 */
    --soft:cubic-bezier(.22,.9,.3,1); --spring:cubic-bezier(.34,1.4,.64,1); --snap:120ms;
    --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  html,body{height:100%}
  body{
    background:radial-gradient(130% 100% at 50% 0%, var(--studio-hi) 0%, var(--studio-lo) 100%);
    color:var(--ink); margin:0; overflow:hidden;
    font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR",system-ui,sans-serif; line-height:1.6;
    display:flex; align-items:center; justify-content:center;
    padding:calc(var(--sat) + 8px) 10px calc(var(--sab) + 8px);
    -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;
  }
  .num{font-variant-numeric:tabular-nums}
  :root{--butter:#F5D48A}

  /* ---- 컬러웨이 ---- */
  .th-cream{
    --body-hi:#FBFAF6; --body-mid:#F1EEE6; --body-lo:#DDD7C9; --rim:#FFFFFF;
    --wheel-a:#F7F5EF; --wheel-b:#EFECE4; --wheel-c:#E4E0D5;
    --acc:#E0703F; --acc-hi:#E87B4C; --acc-lo:#CE5F30; --acc-ink:#7A2A0C; --ui:#CE5F30; --shade:44,41,37;
  }
  .th-sage{
    --body-hi:#DCE4D5; --body-mid:#BECBB3; --body-lo:#93A788; --rim:#EFF4EA;
    --wheel-a:#EDF2E8; --wheel-b:#DDE6D5; --wheel-c:#C8D5BC;
    --acc:#F0EBDD; --acc-hi:#F6F2E7; --acc-lo:#DCD5C2; --acc-ink:#6B6450; --ui:#6F8A63; --shade:52,66,46;
  }
  .th-mist{
    --body-hi:#DCE6EE; --body-mid:#BECDD9; --body-lo:#90A7B8; --rim:#EFF4F8;
    --wheel-a:#ECF1F5; --wheel-b:#DAE3EA; --wheel-c:#C3D1DB;
    --acc:#ECBD6B; --acc-hi:#F1C87F; --acc-lo:#D9A551; --acc-ink:#6E4E14; --ui:#B8862F; --shade:44,60,72;
  }

  /* ---- 디바이스 ---- */
  .device{
    width:100%; max-width:420px; height:100%; max-height:900px;
    border-radius:42px; padding:16px 15px 18px; position:relative;
    display:flex; flex-direction:column;
    background:linear-gradient(160deg,var(--body-hi) 0%,var(--body-mid) 52%,var(--body-lo) 100%);
    transition:background .6s var(--soft);
    box-shadow:
      inset 0 2.5px 2px rgba(255,255,255,.95),
      inset 0 -5px 10px rgba(var(--shade),.30),
      0 24px 50px -22px rgba(var(--shade),.5);
  }
  .device::after{content:""; position:absolute; inset:0; border-radius:42px; pointer-events:none;
    box-shadow:inset 0 0 0 1.5px var(--rim), inset 0 0 0 3px rgba(var(--shade),.06)}
  body.standalone{padding:0}
  body.standalone .device{max-width:none; max-height:none; border-radius:0;
    padding:calc(var(--sat) + 10px) 14px calc(var(--sab) + 12px)}
  body.standalone .device::after{border-radius:0}

  .epaper{
    border-radius:24px; overflow:hidden; position:relative; flex:1; min-height:0;
    background:linear-gradient(175deg,#FAF6EC 0%,var(--paper) 60%,#EDE8DA 100%);
    box-shadow:
      inset 0 4px 9px rgba(94,86,72,.30),
      inset 0 0 0 1.5px rgba(94,86,72,.18),
      0 1.5px 0 rgba(255,255,255,.9);
    color:var(--paper-ink);
  }
  .scr{position:absolute; inset:0; display:flex; flex-direction:column; padding:15px 16px 14px;
    opacity:0; transform:translateX(14px); transition:opacity .32s var(--soft), transform .32s var(--soft); pointer-events:none}
  .scr.active{opacity:1; transform:none; pointer-events:auto}

  /* 상태줄 — §1.1b: 10px / .14em */
  .top{display:flex; justify-content:space-between; align-items:center; gap:8px;
    font-size:10px; letter-spacing:.14em; color:var(--paper-sub); font-weight:700; flex:none}
  .top .tt{white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0}
  /* 배터리 — §0-5: 케이스 28×13 + 볼트 6×9 (비례 고정) */
  /* 지식 시그널 = 미니 만다라 — 여덟 칸이 차고, 완청에 중심 점등 [J pick 07-14] */
  .batt{display:inline-flex; align-items:center; flex:none}
  .ksig .c{fill:rgba(var(--shade),.16); transition:fill .5s}
  .ksig .c.on{fill:var(--ui)}
  .ksig .c.core{fill:transparent; stroke:rgba(var(--shade),.22); stroke-width:1}
  .ksig .c.core.on{fill:var(--butter, #F5D48A); stroke:none}
  /* 버퍼 대기: 현재 문장 하이라이트 숨쉬기 = "준비 중" (탭 무반응처럼 보이는 것 방지) */
  body.abuff .readbox .sent.on{animation:sigBreath 1.1s ease-in-out infinite}
  body.abuff .sln.now span{animation:sigBreath 1.1s ease-in-out infinite}
  @keyframes sigBreath{0%,100%{opacity:1}50%{opacity:.45}}
  .batt.chg .ksig .c.live{animation:sigBreath 1.6s ease-in-out infinite}
  @media (prefers-reduced-motion: reduce){ .batt.chg .ksig .c.live{animation:none} }

  /* ---- 로그인 ---- */
  .login-scr{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 10px}
  .login-mark{font-size:9px; font-weight:800; letter-spacing:.5em; color:var(--paper-sub)}
  .login-big{font-size:17px; font-weight:750; line-height:1.5; margin-top:12px}
  .login-sub{font-size:10px; color:var(--paper-sub); font-weight:600; margin-top:7px}
  .gbtn{
    margin-top:18px; display:flex; align-items:center; gap:9px; border:none; cursor:pointer; font-family:inherit;
    background:#fff; border-radius:99px; padding:12px 19px; font-size:13px; font-weight:750; color:#3B372F;
    box-shadow:inset 0 0 0 1px rgba(94,86,72,.18), 0 3px 8px -3px rgba(94,86,72,.45);
    transition:transform var(--snap) var(--spring); touch-action:manipulation;
  }
  .gbtn:active{transform:scale(.95)}
  /* M1: 샘플 진입 */
  .sample-btn{margin-top:12px; border:none; background:none; font-family:inherit; cursor:pointer;
    font-size:11.5px; font-weight:700; color:var(--paper-sub); text-decoration:underline; text-underline-offset:3px;
    padding:6px 10px; touch-action:manipulation; transition:transform var(--snap) var(--spring)}
  .sample-btn:active{transform:scale(.95)}

  /* ---- 홈 — §1.2 ---- */
  .goal-pill{
    margin-top:11px; display:flex; align-items:center; justify-content:center; gap:8px;
    border:none; cursor:pointer; font-family:inherit; width:100%; flex:none;
    background:rgba(255,255,255,.6); border-radius:12px; padding:11px; font-size:12px; font-weight:750; color:var(--paper-ink);
    box-shadow:inset 0 0 0 1.5px var(--ui); transition:transform var(--snap) var(--spring); touch-action:manipulation;
  }
  .goal-pill:active{transform:scale(.97)}
  .gp-plus{width:13px; height:13px; border-radius:50%; background:var(--ui); position:relative; flex:none}
  .gp-plus::before,.gp-plus::after{content:""; position:absolute; background:#fff; left:50%; top:50%; transform:translate(-50%,-50%)}
  .gp-plus::before{width:7px; height:1.7px} .gp-plus::after{width:1.7px; height:7px}
  .rows{margin-top:10px; display:flex; flex-direction:column; gap:8px; overflow-y:auto; flex:1; min-height:0; padding-bottom:4px}
  .row{display:flex; gap:10px; align-items:center; background:rgba(255,255,255,.55); flex:none;
    box-shadow:inset 0 0 0 1px rgba(94,86,72,.10); border-radius:12px; padding:9px 10px;
    transition:transform var(--snap) var(--spring), box-shadow var(--snap) var(--soft); cursor:pointer; touch-action:manipulation}
  .row.sel{box-shadow:inset 0 0 0 1.5px var(--ui), 0 3px 8px -3px rgba(94,86,72,.4)}
  .row:active{transform:scale(.98)}
  .row.making{opacity:.55; cursor:default; filter:saturate(.15)}
  .row.making:active{transform:none}
  /* M2: 타이포 자켓 — 듀오톤 + 대형 이니셜 */
  .jk{width:44px; height:44px; border-radius:10px; flex:none; position:relative; overflow:hidden;
    display:grid; place-items:center;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.06), 0 2px 5px -2px rgba(0,0,0,.4)}
  .jk b{font-size:21px; font-weight:800; color:rgba(255,255,255,.9); letter-spacing:-.02em;
    text-shadow:0 1px 3px rgba(0,0,0,.22); line-height:1}
  .jk .prog{position:absolute; left:0; right:0; bottom:0; height:3px; background:rgba(0,0,0,.18)}
  .jk .prog i{display:block; height:100%; background:rgba(255,255,255,.85)}
  .jk .prog.full i{background:var(--green)}
  .row .m{min-width:0; flex:1}
  .row .a{font-size:13px; font-weight:750; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; letter-spacing:-.01em}
  .row .b{font-size:10px; color:var(--paper-sub); font-weight:600; display:flex; align-items:center; gap:5px; margin-top:2px}
  .dotnew{width:6px; height:6px; border-radius:50%; background:var(--ui); flex:none}
  .row-empty{font-size:11px; color:var(--paper-sub); font-weight:600; text-align:center; padding:22px 8px; line-height:1.8}
  /* 스켈레톤 토큰 [J:07-14 전수] — 시머는 은은하게, 페이퍼 톤 안에서 */
  .sk{background:linear-gradient(90deg, rgba(var(--shade),.12) 25%, rgba(var(--shade),.05) 37%, rgba(var(--shade),.12) 63%);
    background-size:400% 100%; border-radius:7px; animation:skm 1.5s ease infinite}
  @keyframes skm{0%{background-position:100% 0}100%{background-position:0 0}}
  .skrow{display:flex; gap:12px; align-items:center; padding:12px 12px}
  .skrow .skj{width:44px; height:44px; border-radius:11px; flex:none}
  .skrow .skm{flex:1; display:flex; flex-direction:column; gap:8px}
  .skt{animation:bsk2 1.5s ease-in-out infinite}
  @keyframes bsk2{0%,100%{opacity:.45}50%{opacity:1}}
  @media (prefers-reduced-motion: reduce){ .sk,.skt{animation:none} }

  /* ---- MENU ---- */
  .menu-list{margin-top:12px; display:flex; flex-direction:column; gap:8px}
  .mrow{display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.55); border:none; width:100%;
    font-family:inherit; text-align:left; cursor:pointer; color:var(--paper-ink);
    box-shadow:inset 0 0 0 1px rgba(94,86,72,.10); border-radius:12px; padding:11px 12px; font-size:12px; font-weight:750;
    transition:transform var(--snap) var(--spring); touch-action:manipulation}
  .mrow:active{transform:scale(.98)}
  .mrow .sub{margin-left:auto; font-size:9px; color:var(--paper-sub); font-weight:600}
  .ways{display:flex; gap:8px; margin-left:auto}
  .way{width:24px; height:24px; border-radius:50%; border:none; cursor:pointer; padding:0;
    box-shadow:inset 0 1.5px 2px rgba(255,255,255,.7), inset 0 -2px 4px rgba(0,0,0,.2); touch-action:manipulation}
  .way.on{outline:2px solid var(--paper-ink); outline-offset:2px}
  .way-cream{background:radial-gradient(circle at 50% 32%, #FBFAF6 30%, #E2DDD1)}
  .way-sage{background:radial-gradient(circle at 50% 32%, #D5DECB 30%, #93A788)}
  .way-mist{background:radial-gradient(circle at 50% 32%, #D7E2EA 30%, #90A7B8)}
  .menu-note{font-size:9px; color:var(--paper-sub); font-weight:600; text-align:center; margin-top:auto; padding-top:8px}

  /* ---- 플레이어 (세로) ---- */
  .clipbox{border-radius:12px; overflow:hidden; position:relative; aspect-ratio:16/9; flex:none;
    margin:10px -10px 0; /* [J:07-14] 좌우 여백 회수 — 화면 패딩 16px 중 10px 상쇄 = 유튜브 창 확대 */
    background:#20242E;
    box-shadow:inset 0 0 0 1px rgba(94,86,72,.12), 0 5px 12px -6px rgba(94,86,72,.45)}
  .clipwrap{position:absolute; inset:0}
  .clipwrap .ytp{position:absolute; inset:0}
  .clipwrap .ytp.off{opacity:0; pointer-events:none} /* 프리큐 슬롯 — 화면 밖이 아니라 뒤에서 버퍼 */
  .clipwrap iframe,#yt{position:absolute; inset:0; width:100%; height:100%; border:0}
  .clipbox .guard{position:absolute; inset:0; z-index:3}
  /* S1: 원본 크레딧 — 상시 표기 */
  .credit{flex:none; margin-top:8px; font-size:10px; color:var(--paper-sub); font-weight:600;
    display:flex; align-items:center; gap:5px; white-space:nowrap; min-width:0}
  .credit b{color:var(--paper-ink); font-weight:700; flex:0 1 auto; min-width:0;
    overflow:hidden; text-overflow:ellipsis}
  .credit .crng,.credit .crem{flex:none}
  /* read-along — §1.1b: 세로 17px/1.85 고정 */
  .readbox{flex:1; min-height:0; overflow-y:auto; margin-top:10px; font-size:17px; line-height:1.85;
    letter-spacing:-.005em; padding-right:2px;
    -webkit-mask-image:linear-gradient(180deg,transparent 0,#000 14px,#000 calc(100% - 22px),transparent 100%);
            mask-image:linear-gradient(180deg,transparent 0,#000 14px,#000 calc(100% - 22px),transparent 100%)}
  .readbox p{margin:0 0 10px}
  .readbox .sent{border-radius:7px; padding:1px 4px; margin:0 -2px;
    transition:background-color .35s var(--soft), color .35s var(--soft)}
  .readbox .sent.on{background:var(--butter); color:#3B372F}
  .readbox .sec-title{font-size:11px; letter-spacing:.12em; font-weight:800; color:var(--paper-sub); margin:2px 0 8px}
  /* M3: 챕터 타이틀 카드 */
  .chcard{position:absolute; inset:0; z-index:6; display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; background:linear-gradient(175deg,#FAF6EC,#F0EBDD); gap:8px}
  .chcard.show{display:flex}
  .chcard .n{font-size:11px; letter-spacing:.3em; font-weight:800; color:var(--ui)}
  .chcard .t{font-size:19px; font-weight:750; letter-spacing:-.01em; padding:0 24px; line-height:1.5}
  .ptrack{flex:none; margin-top:10px}
  .chapters{display:flex; gap:4px}
  /* 필름 트랙 [J:07-14] — 내레이션=실선, 유튜브 클립=필름 칩, 현재 위치=글라이딩 재생 헤드 */
  .chapters{padding:3px 0} /* 칩·헤드가 바 위로 살짝 걸치는 여유 */
  .chapters i{flex:1; height:4px; border-radius:2.5px; background:#DED7C6; transition:background .4s; position:relative}
  .chapters i.done{background:var(--ui)}
  .chapters i.now .fillp{position:absolute; left:0; top:0; bottom:0; background:var(--ui); border-radius:2.5px;
    transition:width .45s linear}
  /* 클립 틱 — 인지 가능한 최소 표기 [J:07-14 "심플하게"] : 현재 챕터만, 얇은 세로선 */
  .cchip{position:absolute; top:50%; width:2px; height:8px; border-radius:1px; transform:translate(-50%,-50%);
    background:rgba(var(--shade),.30); z-index:1; transition:background .4s}
  .cchip.past{background:rgba(var(--shade),.18)}
  .cchip.live{background:var(--acc); width:3px; box-shadow:0 0 0 2.5px rgba(224,112,63,.16)}
  .phead{position:absolute; top:50%; transform:translate(-50%,-50%); width:9px; height:9px; border-radius:50%;
    background:var(--acc); box-shadow:0 0 0 3px rgba(224,112,63,.20); z-index:2; transition:left .45s linear}
  .ptimes{display:flex; align-items:center; gap:10px; font-size:10px; color:var(--paper-sub); margin-top:6px; font-weight:600}
  .ptimes #pPos{flex:none; white-space:nowrap}
  .ptimes #pCh{min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .pclock{margin-left:auto; font-size:10px; color:var(--paper-sub); font-weight:650; flex:none}
  .credit .crem{color:var(--acc-ink); font-weight:750}
  body.stage .credit .crem{color:#F5D48A}
  .player-state{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:9px; padding:0 14px}
  .player-state .big{font-size:14px; font-weight:750}
  .player-state .sm{font-size:11px; color:var(--paper-sub); font-weight:600; line-height:1.8}
  .pulse{width:13px; height:13px; border-radius:50%; background:var(--ui); animation:pu 1.1s var(--soft) infinite}
  @keyframes pu{0%,100%{transform:scale(.7); opacity:.5}50%{transform:scale(1.15); opacity:1}}
  /* C3: 완결 — 대형 그린 배터리 */
  .finsig{display:block; width:46px; height:46px}
  .finsig .c{fill:var(--ui)}
  .finsig .c.core{fill:var(--butter, #F5D48A)}
  .fin-next{margin-top:14px; border:none; background:rgba(255,255,255,.6); font-family:inherit; cursor:pointer;
    border-radius:11px; padding:10px 14px; font-size:11.5px; font-weight:700; color:var(--paper-ink);
    box-shadow:inset 0 0 0 1px rgba(94,86,72,.14); touch-action:manipulation; max-width:100%;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:transform var(--snap) var(--spring)}
  .fin-next:active{transform:scale(.96)}
  .fin-next b{font-weight:750}

  /* ---- 목표 입력 ---- */
  .goal-ov{position:absolute; inset:0; z-index:7; display:none; flex-direction:column; justify-content:center;
    background:linear-gradient(175deg,#FAF6ECf2,#F6F2E7f5); padding:20px}
  .goal-ov.show{display:flex}
  .go-title{font-size:14px; font-weight:750; text-align:center}
  .go-body{margin-top:13px}
  #goalInput{width:100%; border:none; border-radius:13px; padding:13px 14px; font-family:inherit;
    font-size:16px; font-weight:600; color:var(--paper-ink); background:#fff;
    box-shadow:inset 0 0 0 1.5px rgba(94,86,72,.22)}
  #goalInput:focus{outline:none; box-shadow:inset 0 0 0 2px var(--acc)}
  .go-actions{display:flex; gap:10px; margin-top:12px}
  .go-cancel,.go-make{flex:1; border:none; cursor:pointer; font-family:inherit; border-radius:12px; padding:12px;
    font-size:12.5px; font-weight:750; transition:transform var(--snap) var(--spring); touch-action:manipulation}
  .go-cancel{background:rgba(255,255,255,.7); color:var(--paper-sub); box-shadow:inset 0 0 0 1px rgba(94,86,72,.16)}
  .go-make{background:var(--ui); color:#fff; box-shadow:0 4px 10px -4px rgba(0,0,0,.35)}
  .go-cancel:active,.go-make:active{transform:scale(.95)}
  .go-progress{display:flex; flex-direction:column; align-items:center; gap:11px; margin-top:15px}
  .go-progress[hidden],.go-body[hidden]{display:none}
  [hidden]{display:none !important} /* display 클래스가 hidden을 이기는 사고 방지 (§7b) */
  .go-msg{font-size:11.5px; font-weight:700; text-align:center; line-height:1.7}
  .go-msg small{display:block; font-size:9px; color:var(--paper-sub); font-weight:600}

  /* ================= 클릭휠 — §1.1 + §1.1a ================= */
  /* [J:07-13 설치앱 판정] 휠 = 하단 고정 — 화면 공간 최우선 (정사각 필드 폐기) */
  .wheelzone{display:grid; place-items:center; flex:none; width:100%; padding-top:12px}
  .wheel{
    width:74%; aspect-ratio:1; border-radius:50%; position:relative; display:grid; place-items:center; /* [J:07-13] 클래식 62% 대비 +20% — 설치앱 하단 낭비 교정 */
    /* 평평한 매트 도넛 — 명암 ±4%, 돔 금지 */
    background:radial-gradient(circle at 50% 38%, var(--wheel-a) 0%, var(--wheel-b) 60%, var(--wheel-c) 100%);
    transition:background .6s; touch-action:none;
    box-shadow:
      inset 0 1px 1.5px rgba(255,255,255,.8),
      inset 0 -1.5px 3px rgba(var(--shade),.12),
      0 1px 1.5px rgba(255,255,255,.75),
      0 10px 22px -12px rgba(var(--shade),.4);
    border:1px solid rgba(var(--shade),.10);
  }
  /* 터치 추종 음영 — 눈금 폐기, 잉크 7% 스팟이 손가락과 1:1로 돎 */
  .wheel .shade{position:absolute; inset:0; border-radius:50%; pointer-events:none; opacity:0;
    transition:opacity .3s var(--soft); will-change:transform}
  .wheel .shade::before{content:""; position:absolute; left:50%; top:4%; width:46%; height:36%;
    transform:translateX(-50%); border-radius:50%;
    background:radial-gradient(ellipse at center, rgba(var(--shade),.16), rgba(var(--shade),.07) 55%, transparent 78%)}
  .wheel .shade::after{content:""; position:absolute; left:50%; bottom:4%; width:40%; height:30%;
    transform:translateX(-50%); border-radius:50%;
    background:radial-gradient(ellipse at center, rgba(255,255,255,.5), rgba(255,255,255,.18) 55%, transparent 78%)}
  .wheel.touching .shade,.wheel.demo .shade{opacity:1}
  /* 파인 센터 웰 + 평평한 허브 (볼록·광택점 금지) */
  .wheel .well{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:43%; aspect-ratio:1; border-radius:50%; pointer-events:none;
    box-shadow:inset 0 2px 4px rgba(var(--shade),.22), inset 0 -1px 1.5px rgba(255,255,255,.7)}
  .core{
    width:39%; aspect-ratio:1; border-radius:50%; border:none; cursor:pointer; position:relative; z-index:2;
    /* [클래식] 오목 접시(dish): 위 그늘·아래 빛받음 — 볼록 금지 (§1.1) */
    background:linear-gradient(178deg, var(--acc-lo) 0%, var(--acc) 55%, var(--acc-hi) 100%);
    transition:transform var(--snap) var(--spring), background .6s, filter var(--snap); touch-action:manipulation;
    box-shadow:inset 0 2.5px 4px rgba(0,0,0,.20), inset 0 -1px 1.5px rgba(255,255,255,.35);
  }
  .core:active{transform:scale(.965); filter:brightness(.96)}
  .wbtn{position:absolute; border:none; background:none; cursor:pointer; padding:9px 11px; border-radius:12px;
    font-size:9px; font-weight:700; letter-spacing:.16em; color:rgba(var(--shade),.42); font-family:inherit;
    transition:transform var(--snap) var(--spring), color .2s; touch-action:manipulation; z-index:2}
  .wbtn svg{display:block; fill:currentColor}
  .wbtn:active{transform:scale(.86); opacity:.55} /* [A] press */
  .wbtn.menu{top:14px; left:50%; transform:translateX(-50%)} .wbtn.menu:active{transform:translateX(-50%) scale(.86)}
  .wbtn.prev{left:14px; top:50%; transform:translateY(-50%)} .wbtn.prev:active{transform:translateY(-50%) scale(.84)}
  .wbtn.next{right:14px; top:50%; transform:translateY(-50%)} .wbtn.next:active{transform:translateY(-50%) scale(.84)}
  .wbtn.play{bottom:14px; left:50%; transform:translateX(-50%)} .wbtn.play:active{transform:translateX(-50%) scale(.86)}
  .engrave{margin-top:7px; text-align:center; font-size:8px; font-weight:700; letter-spacing:.5em; flex:none;
    color:rgba(var(--shade),.28); text-shadow:0 1px 0 rgba(255,255,255,.8)}

  /* ================= 가로 ================= */
  @media (orientation: landscape) and (max-height: 560px){
    body{padding:calc(var(--sat) + 6px) 10px calc(var(--sab) + 6px)}
    .device{max-width:none; max-height:none; flex-direction:row; align-items:stretch; gap:14px; padding:14px 16px}
    .epaper{flex:1}
    .wheelzone{width:34%; padding:0; align-self:center}
    .wheel{width:min(92%, 58vh)} /* [J:07-14] 가로 리스트 휠 확대 — 36vh는 사용 불가 판정 */
    .engrave{display:none}
  }

  /* 재생 + 가로 = 무대 (§2) */
  /* ══ 편집 그리드 — 3밴드 프레임워크 [J:07-13 실기기 반려 후 도입] ══
     밴드 A(상단 정보) / B(본문 뷰포트) / C(컨트롤). 무대 요소는 밴드 토큰만
     참조 — 개별 좌표 즉흥 배치 금지 (중첩·균형 붕괴 구조적 차단) */
  body.stage{padding:0;
    --sg-x:9vw;                          /* 본문 좌우 여백 (A 원문) */
    --sg-a:calc(var(--sat) + 10px);      /* 밴드A 시작 */
    --sg-b:calc(var(--sat) + 66px);      /* 밴드B 시작 (제목행+컨텍스트행+숨) */
    --sg-c:calc(var(--sab) + 62px)}      /* 밴드B 끝 (독 44 + 숨) */
  body.stage .device{max-width:none; max-height:none; border-radius:0; padding:0; gap:0; background:#0D0D10; box-shadow:none}
  body.stage .device::after{display:none}
  body.stage .engrave{display:none}
  /* [J pick 07-14] C3 미니 휠 — 세로 클릭휠의 미니어처, 반투명 상주 */
  body.stage .wheelzone{display:block; position:absolute; z-index:7; width:176px; padding:0;
    right:calc(env(safe-area-inset-right, 0px) + 14px); bottom:calc(var(--sab) + 14px); left:auto; top:auto}
  /* A-기록 핸들 문법 [J:07-14]: 평시 투명 → 터치 시 저투명(시청 무방해) → 3초 머문 뒤 소멸 */
  body.stage .wheel{width:100%; opacity:0; transition:opacity .35s var(--soft)}
  body.stage.railopen .wheelzone{display:none} /* 레일 = 모달 — 휠 잠시 퇴장 */
  body.stage .wheel.awake{opacity:.25}
  .hubpos{display:none}
  body.stage .hubpos{display:block; position:absolute; z-index:3; left:50%; top:50%;
    transform:translate(-50%,-50%); pointer-events:none;
    font-size:12px; font-weight:750; color:#fff; letter-spacing:.02em}
  body.stage .epaper{flex:1; border-radius:0; box-shadow:none; background:#0D0D10; color:#EDE7DC; overflow:hidden}
  body.stage .scr[data-s="player"]{padding:0}
  body.stage #scrPlayer .top{position:absolute; z-index:5; left:16px; right:16px; top:var(--sg-a); color:#B8AE9E;
    transition:opacity .5s}
  body.stage #scrPlayer .top .tt{max-width:58%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  body.stage.clipmode #scrPlayer .top{opacity:0}
  body.stage.clipmode.hud #scrPlayer .top{opacity:1}
  body.stage .ksig .c{fill:rgba(237,231,220,.2)}
  body.stage .ksig .c.on{fill:var(--acc)}
  body.stage .ksig .c.core{fill:transparent; stroke:rgba(237,231,220,.28)}
  body.stage .ksig .c.core.on{fill:#F5D48A; stroke:none}
  /* 클립 = 커버 전체화면, 더블탭 = 컨테인 (G1) */
  body.stage .clipbox{position:absolute; inset:0; margin:0; aspect-ratio:auto; border-radius:0; box-shadow:none; background:#000}
  /* [A] clipmode = video centered on black (컨테인). 더블탭 = 커버(옵션) */
  body.stage .clipwrap{position:absolute; inset:auto; left:50%; top:50%; transform:translate(-50%,-50%);
    height:100dvh; width:calc(100dvh * 16 / 9); max-width:100vw; max-height:100dvh}
  body.stage .clipbox.cover .clipwrap{width:100vw; height:calc(100vw * 9 / 16); max-width:none; max-height:none}
  /* 메타 캡슐 — 4초 후 페이드 (A metaAway) */
  body.stage .credit{position:absolute; z-index:5; left:16px; bottom:calc(var(--sab) + 18px); margin:0; max-width:60vw;
    background:rgba(8,9,14,.55); color:#F2F3F8; border-radius:8px; padding:8px 12px;
    animation:metaAway 4s var(--soft) forwards}
  body.stage .credit b{color:#fff}
  @keyframes metaAway{0%,70%{opacity:1}100%{opacity:0}}
  /* 내레이션: 와이드 에디토리얼 — 21px/1.8 max 32em */
  /* [A 원문] #s-narr{padding:20px 9vw} — 좌우 대칭, 32em 컬럼 중앙 */
  body.stage .readbox{position:absolute; left:9vw; right:9vw; top:14%; bottom:calc(var(--sab) + 40px); margin:0;
    font-size:21px; line-height:1.8}
  body.stage .readbox p{max-width:32em; margin:0 auto 12px}
  body.stage .readbox .sec-title{color:#8F877A; max-width:32em; margin:2px auto 10px}
  body.stage .clipbox:not([hidden]) ~ .readbox{display:none}
  body.stage .chcard{background:#0D0D10; color:#EDE7DC}
  body.stage .chcard .t{color:#EDE7DC}
  /* 진행 = 최하단 2px 헤어라인 (G2: 클립 중엔 HUD 활성 시만) */
  /* [J:07-14] 하단 헤어라인 복원 — 미니 휠 체제의 유일 진행면 */
  .hairline{display:none}
  body.stage .hairline{display:block; position:absolute; z-index:5; left:0; right:0; bottom:0; height:2px;
    background:rgba(255,255,255,.12)}
  body.stage .hairline i{display:block; height:100%; background:var(--ui); transition:width .3s var(--soft)}
  body.stage.clipmode .hairline{opacity:0; transition:opacity .3s}
  body.stage.clipmode.hud .hairline{opacity:1}
  body.stage .ptrack{display:none}
  body.stage .player-state{position:absolute; inset:0; z-index:6} /* 완료 화면 버튼 = 탭레이어 위 */

  /* ── [J pick] 포커스 라인 스트림 (가로 내레이션) ── */
  .s-ctx{display:none}
  body.stage .s-ctx{display:block; position:absolute; z-index:5; left:var(--sg-x); right:var(--sg-x);
    top:calc(var(--sg-a) + 26px); text-align:center; font-size:11px; letter-spacing:.3em; color:#8F877A;
    font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  body.stage .s-ctx b{color:var(--acc); font-weight:800}
  .stream{display:none}
  body.stage .stream:not([hidden]){display:block; position:absolute; z-index:2;
    left:var(--sg-x); right:var(--sg-x); top:var(--sg-b); bottom:var(--sg-c); overflow:hidden;
    clip-path:inset(0); /* iOS: transform 자식이 overflow를 새는 케이스 봉인 */
    -webkit-mask-image:linear-gradient(to bottom, transparent 0, #000 22%, #000 78%, transparent 100%);
    mask-image:linear-gradient(to bottom, transparent 0, #000 22%, #000 78%, transparent 100%)}
  .stream .col{position:absolute; left:0; right:0; top:50%;
    transition:transform .55s cubic-bezier(.3,.75,.25,1)}
  /* 전 라인 동일 폰트 + 현재 줄만 scale — 전환 중 레이아웃 불변 (슬라이드 안정) */
  .sln{text-align:center; padding:9px 0; font-size:19px; line-height:1.6; font-weight:700;
    color:rgba(237,231,220,.42); max-width:76%; margin:0 auto;
    transition:transform .5s cubic-bezier(.3,.75,.25,1), color .45s; transform-origin:center}
  .sln span{border-radius:6px; padding:1px 5px; box-decoration-break:clone; -webkit-box-decoration-break:clone;
    transition:background .45s, color .45s}
  .sln.far{color:rgba(237,231,220,.16)}
  .sln.now{transform:scale(1.26); color:#EDE7DC}
  /* 편집디자인: 긴 문장은 확대를 줄여 밴드B 안에 안착 (3줄+ / 5줄+) */
  .sln.now.l3{transform:scale(1.1)}
  .sln.now.l5{transform:scale(1); font-size:17px}
  .sln.now span{background:var(--butter); color:#3B372F}
  @media (prefers-reduced-motion: reduce){ .stream .col,.sln{transition:none} }
  body.stage.clipmode .s-ctx{opacity:0; transition:opacity .3s}
  body.stage.clipmode.hud .s-ctx{opacity:1}
  body.stage .readbox{display:none !important} /* 가로 내레이션 = 스트림 전용 */

  /* ── 엣지 그립 + 푸시 레일 ── */
  .grip{display:none}
  body.stage .grip{display:block; position:absolute; z-index:6; left:env(safe-area-inset-left, 0px); top:38%; bottom:38%; width:2px;
    border-radius:0 2px 2px 0; background:rgba(255,255,255,.22)}
  .rail{display:none}
  body.stage .rail{display:flex; position:absolute; z-index:1; left:0; top:0; bottom:0; width:31%;
    flex-direction:column; gap:10px;
    padding:calc(var(--sat) + 16px) 2.6% 16px max(5%, calc(env(safe-area-inset-left, 0px) + 14px));
    visibility:hidden; opacity:0; transition:opacity .3s var(--soft), visibility 0s .3s}
  body.stage.railopen .rail{visibility:visible; opacity:1; transition:opacity .3s var(--soft)}
  .rl-it.hd{font-size:11px; letter-spacing:.18em; color:var(--acc); margin-top:6px}
  .rl-ch{font-size:11px; letter-spacing:.3em; color:var(--acc); font-weight:800}
  .rl-list{flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; gap:10px}
  .rl-it{border:none; background:none; font-family:inherit; text-align:left; cursor:pointer; touch-action:manipulation;
    font-size:13px; font-weight:700; color:rgba(237,231,220,.45); padding:9px 12px; border-radius:8px; line-height:1.75}
  .rl-it.done{color:rgba(237,231,220,.45)}
  .rl-it.done::after{content:" ✓"; color:rgba(237,231,220,.35)}
  .rl-it.now{color:#EDE7DC; font-weight:750; background:rgba(224,112,63,.16); border-left:3px solid var(--acc)}
  .rl-foot{font-size:10px; color:#8F877A; font-weight:600}
  /* 푸시: 무대가 우측 69% 박스로 동형 축소 (목업 기하 — 오버레이/블러 없음) */
  body.stage #scrPlayer{transition:left .35s var(--soft), transform .35s var(--soft), border-radius .35s, box-shadow .35s}
  body.stage.railopen #scrPlayer{left:31%; transform:scale(.94); transform-origin:right center;
    border-radius:14px; overflow:hidden; background:#131317;
    box-shadow:0 0 0 1px rgba(255,255,255,.07), -14px 0 34px rgba(0,0,0,.5)}
  body.stage.railopen .sln{font-size:15px}
  body.stage.railopen .grip{display:none}

  /* ── C1 탭 존 레이어 ── */
  .stagetap{display:none}
  body.stage .stagetap{display:block; position:absolute; inset:0; z-index:4} /* 유튜브 문법 탭 존 [J:07-14] */


  /* 클립 로딩 베일 — YT 기본 스피너 대체 (재생 시작 시 페이드아웃) */
  .clipveil{position:absolute; inset:0; z-index:3; background:#000; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; opacity:1;
    transition:opacity .45s var(--soft); pointer-events:none}
  .clipveil.off{opacity:0}
  .clipveil i{width:30px; height:30px; border-radius:50%; border:2px solid rgba(255,255,255,.14);
    border-top-color:var(--acc); animation:veilspin 1s linear infinite}
  .clipveil span{font-size:9px; letter-spacing:.5em; color:rgba(237,231,220,.34); font-weight:700; padding-left:.5em}
  .clipveil.hold{background:rgba(6,6,8,.88)}
  .clipveil.hold i{display:none}
  @keyframes veilspin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){ .clipveil i{animation:none} }
  /* iOS 설치 가이드 시트 */
  .inst-ov{position:absolute; inset:0; z-index:60; background:rgba(30,27,22,.45);
    display:flex; align-items:flex-end; justify-content:center; padding:18px}
  .inst-ov[hidden]{display:none !important}
  .inst-card{width:100%; max-width:330px; background:var(--paper-hi, #FAF6EC); border-radius:18px;
    padding:20px 20px 14px; box-shadow:0 18px 44px rgba(30,27,22,.35); display:flex; flex-direction:column; gap:11px}
  .inst-t{font-size:15px; font-weight:800; color:var(--paper-ink)}
  .inst-step{font-size:13.5px; color:var(--paper-ink); line-height:1.7}
  .inst-step b{color:var(--acc-ink)}
  .inst-n{display:inline-grid; place-items:center; width:19px; height:19px; border-radius:50%;
    background:var(--acc); color:#fff; font-size:11px; font-weight:800; margin-right:8px}
  .inst-x{border:none; background:none; cursor:pointer; font-family:inherit; font-size:13px; font-weight:750;
    color:var(--paper-sub); padding:9px; margin-top:2px; touch-action:manipulation}

  /* 배속 캡슐 — 팟캐스트 문법: 재생 화면에서 탭 = 순환 */
  .shr{border:none; background:none; cursor:pointer; touch-action:manipulation; color:var(--paper-sub);
    padding:4px 8px; margin-left:auto; flex:none; line-height:0}
  .shr:active{transform:scale(.88)}
  .shr svg{display:block}
  body.stage .shr{color:#B8AE9E}
  .top .batt{margin-left:0}
  .spd{border:1px solid rgba(var(--shade),.28); background:none; cursor:pointer; touch-action:manipulation;
    font-family:inherit; font-size:10.5px; font-weight:750; color:var(--paper-sub);
    border-radius:999px; padding:2px 9px; line-height:1.5; flex:none}
  .spd.on{color:var(--acc-ink); border-color:var(--acc-lo); background:rgba(var(--shade),.05)}
  .spd:active{transform:scale(.92)}
  body.stage .ptrack .spd{display:none} /* 무대는 전용 캡슐 사용 */
  .spd-stage{display:none}
  body.stage .spd-stage{display:block; position:absolute; z-index:6; right:16px; top:calc(var(--sg-a) + 26px);
    border:1px solid rgba(237,231,220,.28); background:rgba(20,20,24,.5); color:#B8AE9E;
    font-family:inherit; font-size:10.5px; font-weight:750; border-radius:999px; padding:2px 9px;
    cursor:pointer; touch-action:manipulation; transition:opacity .3s}
  body.stage .spd-stage.on{color:#F5D48A; border-color:rgba(245,212,138,.55)}
  body.stage.clipmode .spd-stage{opacity:0; pointer-events:none}
  body.stage.clipmode.hud .spd-stage{opacity:1; pointer-events:auto}
  .toast{position:fixed; left:50%; bottom:calc(var(--sab) + 26px); transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#F5F2EC; font-size:11.5px; font-weight:700; border-radius:99px; padding:9px 16px;
    opacity:0; transition:opacity .3s, transform .3s var(--spring); pointer-events:none; z-index:50; white-space:nowrap;
    max-width:86vw; overflow:hidden; text-overflow:ellipsis}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  /* §5: 세로 짧은 뷰포트 — 하단 트림 압축, 회수분은 스크린이 흡수 */
  @media (max-height: 820px) and (orientation: portrait){
    body{padding-bottom:calc(var(--sab) + 4px)}
    .device{padding-bottom:8px}
  }

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.001s !important; transition-duration:.001s !important}
  }
</style>

<body>
  <!-- 부팅 스켈레톤 — 콜드 런치 백지 방지 [J:07-14]. 앱 첫 화면 표시 시 페이드아웃 -->
  <div id="boot" style="position:fixed;inset:0;z-index:99;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-start;background:#EDE9DE;
    transition:opacity .4s ease;padding:calc(env(safe-area-inset-top,0px) + 26px) 22px calc(env(safe-area-inset-bottom,0px) + 18px)">
    <style>

<script>
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var dev=document.getElementById('dev');
  function toast(msg){
    var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove('show')},2400);
  }
  function esc(s){ return String(s==null?'':s).replace(/[<>&"]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]}) }

  /* ================= 인증 ================= */
  var SUPA='https://rckkhhjanqgaopynhfgd.supabase.co';
  var SUPA_KEY='sb_publishable_4qmeVEdSP70SEK3Ct_xHdA_Kp9aBfJK';
  var OWN_KEY='insighta-mobile-auth';
  var SPA_KEY='sb-rckkhhjanqgaopynhfgd-auth-token';
  function readJSON(raw){ if(!raw) return null;
    try{ if(raw.indexOf('base64-')===0) raw=atob(raw.slice(7)); return JSON.parse(raw); }catch(e){ return null } }
  function saveSession(s){ try{localStorage.setItem(OWN_KEY,JSON.stringify(s))}catch(e){} }
  function loadSession(){
    if(location.hash.indexOf('access_token=')>=0){
      var p=new URLSearchParams(location.hash.slice(1));
      var s={access_token:p.get('access_token'), refresh_token:p.get('refresh_token'),
             expires_at:Math.floor(Date.now()/1000)+parseInt(p.get('expires_in')||'3600',10)};
      history.replaceState(null,'',location.pathname+location.search);
      saveSession(s); return s;
    }
    var own=readJSON(localStorage.getItem(OWN_KEY)); if(own&&own.access_token) return own;
    var spa=readJSON(localStorage.getItem(SPA_KEY)); if(spa&&spa.access_token) return spa;
    return null;
  }
  async function freshToken(){
    var s=loadSession(); if(!s) return null;
    var now=Math.floor(Date.now()/1000);
    if(s.expires_at && s.expires_at>now+60) return s.access_token;
    if(!s.refresh_token) return null;
    try{
      var r=await fetch(SUPA+'/auth/v1/token?grant_type=refresh_token',{
        method:'POST', headers:{apikey:SUPA_KEY,'Content-Type':'application/json'},
        body:JSON.stringify({refresh_token:s.refresh_token})});
      if(!r.ok) return null;
      var j=await r.json();
      var ns={access_token:j.access_token, refresh_token:j.refresh_token||s.refresh_token,
              expires_at:Math.floor(Date.now()/1000)+(j.expires_in||3600)};
      saveSession(ns); return ns.access_token;
    }catch(e){ return null }
  }
  function loginRedirect(){
    location.href=SUPA+'/auth/v1/authorize?provider=google&redirect_to='
      +encodeURIComponent(location.origin+'/mobile/');
  }
  async function api(path,opts){
    var tok=await freshToken(); if(!tok) throw new Error('unauthenticated');
    opts=opts||{}; opts.headers=Object.assign({Authorization:'Bearer '+tok,'Content-Type':'application/json'},opts.headers||{});
    var r=await fetch('/api/v1'+path,opts);
    if(!r.ok){ var e=new Error('HTTP '+r.status); e.status=r.status; throw e; }
    return r;
  }

  /* ================= 화면 상태 ================= */
  var SCREENS=['login','home','menu','player'];
  var scr={}; SCREENS.forEach(function(n){scr[n]=document.querySelector('.scr[data-s="'+n+'"]')});
  var cur='login';
  function bootDone(){
    var b=document.getElementById('boot'); if(!b) return;
    b.style.opacity='0'; setTimeout(function(){ if(b.parentNode) b.parentNode.removeChild(b); },420);
  }
  function show(n){
    bootDone();
    if(n===cur) return;
    scr[cur].classList.remove('active');
    cur=n; scr[cur].classList.add('active');
    syncStage();
  }
  function syncStage(){
    var land=matchMedia('(orientation: landscape)').matches;
    var on=land && cur==='player';
    var was=document.body.classList.contains('stage');
    document.body.classList.toggle('stage', on);
    if(on&&!was){ hudWake(); updateStream(true); updateDock(); wheelAwake(); wheelSleep(); }
    if(!on&&was){ document.body.classList.remove('railopen'); }
  }
  addEventListener('resize', syncStage);
  addEventListener('orientationchange', syncStage);

  /* ================= 배터리 (§0-5) ================= */
  var charge=20;
  function renderBatt(){ // 미니 만다라: 시계방향 8칸 채움, 완청(100)=중심 버터 점등
    var lit=Math.min(8, Math.floor(charge/100*8+0.0001));
    var full=charge>=100;
    ['sigHome','sigMenu','sigPlay'].forEach(function(id){
      var w=document.getElementById(id); if(!w) return;
      var cells=w.querySelectorAll('.ksig .c');
      for(var i=0;i<8;i++){
        cells[i].classList.toggle('on', i<lit);
        cells[i].classList.toggle('live', i===lit-1&&!full); // 방금 켜진 칸 = 숨쉬기(충전 중)
      }
      cells[8].classList.toggle('on', full);
      if(full) cells[8].classList.add('live');
    });
  }
  function addCharge(v){ charge=Math.min(charge+v,100); renderBatt(); }
  function setCharging(on){
    document.querySelectorAll('.batt').forEach(function(b){b.classList.toggle('chg',on)});
  }
  renderBatt();

  /* 차임 (§0-8) — pre-produce에서 정식 사운드로 대체 예정 */
  var actx=null;
  function chime(kind){
    try{
      actx=actx||new (window.AudioContext||window.webkitAudioContext)();
      var notes=kind==='start'?[523.25,783.99]:kind==='ch'?[659.25]:[783.99,523.25];
      notes.forEach(function(f,i){
        var o=actx.createOscillator(), g=actx.createGain();
        o.type='sine'; o.frequency.value=f; o.connect(g); g.connect(actx.destination);
        var st=actx.currentTime+i*0.16;
        g.gain.setValueAtTime(0.0001,st);
        g.gain.exponentialRampToValueAtTime(kind==='ch'?0.05:0.09,st+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001,st+0.5);
        o.start(st); o.stop(st+0.55);
      });
    }catch(e){}
  }

  /* ================= 컬러웨이 ================= */
  document.querySelectorAll('.way').forEach(function(w){
    w.addEventListener('click',function(){
      document.querySelectorAll('.way').forEach(function(x){x.classList.remove('on')});
      w.classList.add('on');
      dev.classList.remove('th-cream','th-sage','th-mist');
      dev.classList.add(w.dataset.th);
      try{localStorage.setItem('insighta-player-th',w.dataset.th)}catch(e){}
    });
  });
  try{
    var savedTh=localStorage.getItem('insighta-player-th');
    if(savedTh && /^th-(cream|sage|mist)$/.test(savedTh)){
      dev.classList.remove('th-cream'); dev.classList.add(savedTh);
      document.querySelectorAll('.way').forEach(function(w){w.classList.toggle('on',w.dataset.th===savedTh)});
    }
  }catch(e){}

  /* ================= 이어 듣기 (C1) ================= */
  function resumeKey(id){ return 'insighta-resume-'+id }
  function saveResume(id,pos,total,done){ // (pos=재생 위치, 학습 진도는 lb로 별도)
    try{localStorage.setItem(resumeKey(id),JSON.stringify({bi:pos,total:total,done:!!done,lb:learnedBi}))}catch(e){}
  }
  function loadResume(id){ return readJSON(localStorage.getItem(resumeKey(id))) }

  /* ================= M1: 샘플 에피소드 (A 원형 — 실제 노트 atom·실측 구간·크레딧) ================= */
  var SAMPLE={
    id:'__sample__', title:'지정학으로 국제 정세 읽기', sample:true, sourceVideos:19,
    book:{ source_videos:19, chapters:[

  /* ── 에피소드 오디오 (ElevenLabs pre-produce) — manifest = (비트 인덱스, 문장해시) 키 ──

  var epAudio={tempo:1, ready:false}, curAudio=null;

  async function prefetchNarr(i){ // 비트 오디오 → 블롭 선로드

  /* ================= 클릭휠 엔진 — §1.1a J1~J8 ================= */
  var wheel=document.getElementById('wheel'), shade=document.getElementById('wheelShade');
  var NOTCH=32; // [A] DETENT=32
  (function(){
    var dragging=false, lastAng=0, lastT=0, acc=0, visAngle=0, kick=0, rubber=0, rafId=null;
    function angOf(e){
      var r=wheel.getBoundingClientRect();
      var x=e.clientX-(r.left+r.width/2), y=e.clientY-(r.top+r.height/2);
      return {a:Math.atan2(y,x)*180/Math.PI+90, r:Math.hypot(x,y)/(r.width/2)};
    }
    function frame(){ // J1: rAF 직결
      shade.style.transform='rotate('+(visAngle-kick+rubber)+'deg)';
      kick*=0.72; rubber*=0.82;
      if(Math.abs(kick)>0.05||Math.abs(rubber)>0.05||dragging){ rafId=requestAnimationFrame(frame); }
      else rafId=null;
    }
    function kickFrame(){ if(!rafId) rafId=requestAnimationFrame(frame); }
    var pendBtn=false, pendX=0, pendY=0, pendAng=0, pendId=null;
    wheel.addEventListener('pointerdown',function(e){
      var onBtn=e.target.closest('.wbtn')||e.target.closest('.core');
      var p=angOf(e);
      if(onBtn){ // 버튼 위 시작 = 지연 판정 — 회전 임계 넘으면 휠, 아니면 클릭 (J:07-14)
        pendBtn=true; pendX=e.clientX; pendY=e.clientY; pendAng=p.a; pendId=e.pointerId;
        return;
      }
      if(p.r<0.44||p.r>1.1) return; // J8: 허브 데드존 + 관용 존
      dragging=true; lastAng=p.a; lastT=e.timeStamp; acc=0;
      visAngle=p.a; // 음영이 손가락 위치에서 시작
      wheel.classList.add('touching');
      wheel.setPointerCapture(e.pointerId);
      kickFrame();
    });
    wheel.addEventListener('pointermove',function(e){
      if(pendBtn){
        var p0=angOf(e);
        var d0=p0.a-pendAng; if(d0>180)d0-=360; if(d0<-180)d0+=360;
        if(Math.hypot(e.clientX-pendX,e.clientY-pendY)>10||Math.abs(d0)>6){
          pendBtn=false; dragging=true; stealClick=true;
          lastAng=p0.a; lastT=e.timeStamp; acc=0; visAngle=p0.a;
          wheel.classList.add('touching');
          try{ wheel.setPointerCapture(pendId) }catch(err){}
          kickFrame();
        }
        return;
      }
      if(!dragging) return;
      var p=angOf(e);
      var d=p.a-lastAng; if(d>180)d-=360; if(d<-180)d+=360;
      var dt=Math.max(e.timeStamp-lastT,1);
      lastAng=p.a; lastT=e.timeStamp;
      visAngle+=d; acc+=d;
      var vel=Math.abs(d)/dt*1000; // J3: 가속
      var units=vel>360?4:vel>180?2:1;
      while(acc>=NOTCH){ acc-=NOTCH; notch(1,units); }
      while(acc<=-NOTCH){ acc+=NOTCH; notch(-1,units); }
      kickFrame();
    });
    ['pointerup','pointercancel','pointerleave'].forEach(function(ev){
      wheel.addEventListener(ev,function(){ pendBtn=false; dragging=false; acc=0; wheel.classList.remove('touching'); kickFrame(); });
    });
    function notch(dir,units){
      kick+=1.5*dir; // J2: 시각 디텐트
      if(navigator.vibrate) navigator.vibrate(8);
      var n=(cur==='player')?(units||1):1; // J3: 가속은 재생 구간만 — 메뉴는 1노치 1행 (아이팟)
      for(var u=0;u<n;u++) dispatchNotch(dir);
    }
    window.wheelRubber=function(dir){ rubber+=15*dir; kickFrame(); }; // J4
    window.wheelDemo=function(){ // J6: 첫 발견
      wheel.classList.add('demo');
      var t0=null;
      function d(ts){ if(!t0)t0=ts; var p=Math.min((ts-t0)/1200,1);
        visAngle=Math.sin(p*Math.PI)*40; kickFrame();
        if(p<1) requestAnimationFrame(d); else setTimeout(function(){wheel.classList.remove('demo')},250);
      }
      requestAnimationFrame(d);
    };
  })();
  function updateSel(){

  /* 무대 휠 표시 수명: 터치 중 유지, 손 뗀 뒤 3s 후 소멸 (A 게임핸들 문법) */
  var WHEEL_LINGER_MS=3000;

  var streamEl=document.getElementById('stream'), sCtx=document.getElementById('sCtx'),

  function renderStream(){ // 비트의 전체 문장 → 슬라이드 칼럼 구축
    strCol.innerHTML='';

  function updateStream(immediate){ // 현재 문장을 밴드B 중앙으로 — 미끄러지는 전환
    var lines=strCol.children; if(!lines.length) return;
    var idx=Math.max(0,Math.min(curSentIdx,lines.length-1));
    for(var i=0;i<lines.length;i++){
      var d=Math.abs(i-idx);

    var rows=Math.round(el.offsetHeight/30.4); // 19px * 1.6 line-height

  function buildRail(){ // 섹션 목록 = 구간 점프

  /* 탭 존 = 유튜브 문법, 내레이션·클립 동일 [J:07-14 "기존 사용성을 막지 않아야"]

  (function(){

      return;
    }
    navigator.clipboard.writeText(url).then(function(){ toast('48시간 링크가 복사됐어요'); })
      .catch(function(){ prompt('이 링크를 복사하세요', url); });
  };
  // Android/Chrome: beforeinstallprompt 캡처 → 버튼 탭 시 실제 설치 프롬프트
  var deferredInstall=null;
  window.addEventListener('beforeinstallprompt',function(e){ e.preventDefault(); deferredInstall=e; });
  document.getElementById('bInstall').onclick=function(){
    var standalone=matchMedia('(display-mode: standalone)').matches || navigator.standalone===true;
    if(standalone){ toast('이미 앱으로 실행 중'); return; }
    if(deferredInstall){ // Android — 네이티브 설치 다이얼로그 (실설치)
      deferredInstall.prompt();
      deferredInstall.userChoice.then(function(r){
        if(r&&r.outcome==='accepted') toast('홈 화면에 설치했어요');
        deferredInstall=null;
      });
      return;
    }
    // iOS — 프로그래매틱 설치 불가(플랫폼 정책) → 단계 가이드 시트
    document.getElementById('instOv').hidden=false;
  };

  /* ================= 목표 입력 ================= */
  var ov=document.getElementById('goalOv'), goBody=document.getElementById('goBody'),
      goProg=document.getElementById('goProgress'), goMsg=document.getElementById('goMsg'),
      goTitle=document.getElementById('goTitle'), goalInput=document.getElementById('goalInput');
  document.getElementById('bGoal').onclick=function(){
    ov.classList.add('show'); goBody.hidden=false; goProg.hidden=true;
    goTitle.textContent='무엇을 배우고 싶나요?';
    setTimeout(function(){goalInput.focus()},60);
  };
  document.getElementById('goCancel').onclick=function(){ ov.classList.remove('show') };
  async function wizardStream(goal,sessionId,tok){
    var r=await fetch('/api/v1/mandalas/wizard-stream',{
      method:'POST',
      headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json',Accept:'text/event-stream'},
      body:JSON.stringify({goal:goal, previewOnly:true, session_id:sessionId})
    });
    if(!r.ok||!r.body) throw new Error('wizard-stream HTTP '+r.status);
    var reader=r.body.getReader(), dec=new TextDecoder(), buf='', structure=null;
    while(true){
      var ch=await reader.read(); if(ch.done) break;
      buf+=dec.decode(ch.value,{stream:true});
      var blocks=buf.split('\n\n'); buf=blocks.pop()||'';
      for(var b=0;b<blocks.length;b++){
        var block=blocks[b]; if(!block||block.charAt(0)===':') continue;
        var ev='',data='';
        block.split('\n').forEach(function(l){
          if(l.indexOf('event: ')===0) ev=l.slice(7).trim();
          else if(l.indexOf('data: ')===0) data+=l.slice(6);
        });
        if(!ev) continue;
        var payload=data?JSON.parse(data):{};
        if(ev==='structure_ready') structure=payload.structure;
        else if(ev==='error'||ev==='structure_error'||ev==='save_error')
          throw new Error(payload.message||('wizard-stream '+ev));
        else if(ev==='complete'){ reader.cancel(); return structure; }
      }
    }
    return structure;
  }
  document.getElementById('goMake').onclick=async function(){
    var goal=(goalInput.value||'').trim();
    if(goal.length<4){ goalInput.focus(); return; }
    goBody.hidden=true; goProg.hidden=false;
    goTitle.textContent='"'+goal+'"';
    try{
      var tok=await freshToken(); if(!tok){ loginRedirect(); return; }
      var sessionId=(crypto.randomUUID?crypto.randomUUID():String(Date.now())+'-'+Math.random().toString(16).slice(2));
      goMsg.innerHTML='만다라 구조를 그리는 중…<small>10~20초</small>';
      var st=await wizardStream(goal,sessionId,tok);
      if(!st) throw new Error('구조 생성 실패');
      goMsg.innerHTML='카드를 모아 저장하는 중…<small>거의 다 됐어요</small>';
      await api('/mandalas/create-with-data',{method:'POST',body:JSON.stringify({
        title:st.center_label||goal, centerGoal:st.center_goal||goal,
        subjects:st.sub_goals||[], centerLabel:st.center_label,
        subLabels:st.sub_labels, session_id:sessionId
      })});
      goMsg.innerHTML='만들어졌어요 — 노트 준비 중<small>카드가 모이면 목록에 떠요</small>';
      loadList();
      setTimeout(function(){ ov.classList.remove('show'); goalInput.value=''; },1800);
    }catch(e){
      goMsg.innerHTML='만들지 못했어요 — 다시 시도해주세요<small>'+esc(String(e.message||e).slice(0,60))+'</small>';
      setTimeout(function(){ goBody.hidden=false; goProg.hidden=true;
        goTitle.textContent='무엇을 배우고 싶나요?'; },1600);
    }
  };

  /* ================= 부팅 ================= */
  if(new URLSearchParams(location.search).get('invite')==='1'){
    document.getElementById('loginSub').textContent='친구가 공유한 인사이타 — Google로 3초 만에 시작';
  }
  if(navigator.standalone===true || matchMedia('(display-mode: standalone)').matches){
    document.body.classList.add('standalone');
  }
  scr[cur].classList.add('active');
  var GUEST=null;
  (async function boot(){
    var g=new URLSearchParams(location.search).get('g');
    if(g){ // 공유 링크 = 48시간 게스트 청취 → 만료 시 로그인 안내
      GUEST=g;
      try{
        var r=await fetch('/api/v1/guest/'+encodeURIComponent(g)+'/book');
        if(r.status===401){ GUEST=null; show('login'); toast('공유 링크가 만료됐어요 — 로그인하고 계속 들어보세요'); return; }
        if(!r.ok) throw new Error('HTTP '+r.status);
        var j=await r.json();
        var m={id:'__guest__', guest:true, title:j.data.title||'공유된 노트',
               book:j.data.book, sourceVideos:j.data.sourceVideos};
        document.getElementById('loginSub').textContent='선물 받은 노트를 듣고 있어요 — 내 노트를 만들려면 로그인';
        openNote(m);
        toast('48시간 동안 들을 수 있어요');
        return;
      }catch(e){ GUEST=null; show('login'); toast('링크를 열지 못했어요'); return; }
    }
    var tok=await freshToken();
    if(tok){ show('home'); loadList(); wheelIntroOnce(); }
    else { show('login'); }
  })();
</script>
