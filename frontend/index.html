<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="유튜브를 당신의 커리큘럼으로. 알고리즘이 아니라 나의 학습 목표가 유튜브를 큐레이션하는 학습 도구, Insighta. 클로즈드 베타 신청 중." />
    <meta name="theme-color" content="#09090b" />
    <title>Insighta — 유튜브를 당신의 커리큘럼으로</title>

    <!-- Open Graph / social share preview (KakaoTalk, Slack, Facebook, X).
         SPA serves this single static card for every path (no per-route SSR),
         so it is tuned for the closed-beta recruit. Image is public/og-beta.png
         (1200x630). Update the copy/image together when the campaign changes. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Insighta" />
    <meta property="og:title" content="Insighta — 유튜브를 당신의 커리큘럼으로" />
    <meta property="og:description" content="알고리즘이 아니라 나의 학습 목표가 유튜브를 큐레이션한다. 클로즈드 베타 6주 · Pro 멤버십 무료 · 우수 멤버 2명 Lifetime." />
    <meta property="og:url" content="https://insighta.one/beta" />
    <meta property="og:image" content="https://insighta.one/og-beta.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ko_KR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Insighta — 유튜브를 당신의 커리큘럼으로" />
    <meta name="twitter:description" content="알고리즘이 아니라 나의 학습 목표가 유튜브를 큐레이션한다. 클로즈드 베타 신청 중." />
    <meta name="twitter:image" content="https://insighta.one/og-beta.png" />
    <!-- Lemon Squeezy Lemon.js — provides window.LemonSqueezy overlay so the
         checkout modal opens in-place without leaving insighta.one (CP456). -->
    <script src="https://app.lemonsqueezy.com/js/lemon.js" defer></script>
    <style>
      /* Prevent white flash before JS loads */
      #root:empty {
        min-height: 100vh;
        background: hsl(220,16%,8%);
      }
      html:not(.dark) #root:empty {
        background: hsl(0,0%,100%);
      }

      /* Boot shell — visible from the moment HTML hits the browser until
         React renders anything into #root. No JS dependency. Rolling this
         back = delete this <style> block + the #boot-shell div below. */
      #boot-shell {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: hsl(220, 16%, 8%);
        z-index: 9999;
        pointer-events: none;
      }
      html:not(.dark) #boot-shell {
        background: hsl(0, 0%, 100%);
      }
      .boot-shell-brand {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 600;
        font-size: 28px;
        letter-spacing: -0.02em;
        color: hsl(0, 0%, 88%);
      }
      html:not(.dark) .boot-shell-brand {
        color: hsl(220, 16%, 20%);
      }
      .boot-shell-pulse {
        width: 48px;
        height: 3px;
        border-radius: 2px;
        background: hsl(0, 0%, 35%);
        animation: boot-shell-pulse 1.4s ease-in-out infinite;
      }
      html:not(.dark) .boot-shell-pulse {
        background: hsl(220, 8%, 70%);
      }
      @keyframes boot-shell-pulse {
        0%, 100% { opacity: 0.25; transform: scaleX(0.4); }
        50%      { opacity: 1;    transform: scaleX(1); }
      }
      /* Hide the shell as soon as React renders anything into #root.
         Chrome 105+, Safari 15.4+, Firefox 121+. JS fallback below. */
      body:has(#root:not(:empty)) #boot-shell {
        display: none;
      }
    </style>
    <script>
      try {
        if (localStorage.getItem('theme') !== 'light') {
          document.documentElement.classList.add('dark');
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>

    <div id="boot-shell" role="presentation" aria-hidden="true">
      <div class="boot-shell-brand">Insighta</div>
      <div class="boot-shell-pulse"></div>
    </div>
    <script>
      /* Fallback removal for browsers without :has() support. MutationObserver
         is universally available. Safe no-op if the shell is already hidden. */
      (function () {
        var root = document.getElementById('root');
        var shell = document.getElementById('boot-shell');
        if (!root || !shell) return;
        if (root.childNodes.length > 0) { shell.remove(); return; }
        var obs = new MutationObserver(function () {
          if (root.childNodes.length > 0) {
            shell.remove();
            obs.disconnect();
          }
        });
        obs.observe(root, { childList: true });
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
