# =============================================================================
# Insighta - Production Docker Compose
# =============================================================================
# Uses pre-built images from GHCR (GitHub Container Registry).
# EC2 host Nginx handles SSL termination.
# Database: Supabase Cloud PostgreSQL.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # API Server (Backend)
  # ---------------------------------------------------------------------------
  api:
    image: ${API_IMAGE:-ghcr.io/jk42jj/insighta-api:latest}
    container_name: insighta-api
    restart: unless-stopped
    command: ["api"]
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - API_HOST=0.0.0.0
      - API_PORT=3000
      # Redis host: Docker service name resolves via bridge network DNS.
      # Was Tailscale IP (${INSIGHTA_TAILSCALE_IP}) but Docker bridge
      # containers cannot reach the host's Tailscale interface.
      # REDIS_INSIGHTA_PASSWORD is supplied via env_file .env.
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_USER=insighta
      # CP416 Phase 3 (2026-04-22) — activate semantic center-gate.
      # Cosine similarity over qwen3-embedding:8b (4096d, same space as
      # mandala_embeddings). Replaces the 2026-04-21 'subword' activation
      # whose char-2-gram recall (0.27) surfaced as the "2 cards" symptom
      # — embedding-based recall admits paraphrase/composite-word pairs
      # that the lexical gate dropped. Tuning knob, not a secret (CP392).
      # Safety: code auto-fallbacks to 'substring' when embedBatch throws
      # (mandala-filter.ts guard) — Ollama downtime does not break the gate.
      # Revert: set to 'subword' / 'substring' or delete this line (code
      # default 'substring' takes over) and redeploy.
      #
      # CP418 (2026-04-23): rolled back from 'semantic' to 'subword' after
      # prod regression. `step2_result.debug.timing.semanticGateEmbedMs`
      # measured 36~56s per request (= 90%+ of total v3 run time) because
      # `embedBatch` received [centerGoal, ...hundreds of candidate titles]
      # as a single batch against mac mini Ollama `qwen3-embedding:8b`.
      # Re-enable path: (a) pool >= 10k rows (Phase 3B), (b) candidate
      # top-N cap before embed (e.g. top 30), (c) domain-tuned embedding.
      # See docs/design/realtime-search-pipeline.md (Phase 3A).
      # CP500++ CONFIG-SSOT (2026-06-16) — REMOVED dead duplicate
      # `V3_CENTER_GATE_MODE=subword`. The later `=semantic` definition below
      # (~:320) wins (Docker Compose keeps the LAST of a duplicated key), so this
      # earlier line was a silent no-op (prod printenv = semantic). Live value
      # preserved = semantic. NOTE: the CP418 subword-rollback intent above is
      # HISTORICAL and was silently overridden — possibly unintended; flagged for
      # SEPARATE review (PR-1 is value-invariant SSOT cleanup, behavior unchanged).
      # CP492 (2026-06-01) — A/B: cell_binning picker. Default in code is 'llm'
      # (current OpenRouter Haiku batch picker). Measured problems with 'llm':
      # it is the discover bottleneck (llmMs 5.8-7.7s = 85-90% of discover; its
      # 5s abort is cosmetic — pickerTimedOut=true while llmMs runs full) AND it
      # ignores cellIndex, so output fills only 1-4 of 9 cells (cell skew). This
      # flag skips the LLM and round-robins fanout candidates by query cellIndex
      # → ~1s discover (precompute MISS disappears) + 9-cell balance. Open A/B
      # question this exists to answer: does dropping the LLM let YouTube garbage
      # through (the picker's original purpose)? Affects BOTH wizard precompute
      # AND add-cards (shared runV5Executor).
      # Revert: delete this line and redeploy — code default 'llm' restores the
      # batch picker bit-identically.
      - V5_PICKER_MODE=cell_binning
      # CP492 (2026-06-02) — per-cell LLM query generation ON. Rule-based concat
      # collapsed each cell label into a bare-noun tail on the full center goal
      # ("...학습할 수", 9-word) → YouTube sparse → high-view global backfill
      # (Chinese drama / generic self-help / EN-AR leak). Measured: rule "시간관리"
      # cell q = 0/4 relevant. One Haiku call (~2.2s) translates each cell label
      # into a focused searchable query → 7/8 cells relevant, 0 garbage. Also lifts
      # unique supply (distinct per-cell queries overlap less than the shared
      # center-prefix rule queries — the dedup-collapse the Step1/Step3 knobs above
      # were band-aiding). Never throws: any failure → rule-based (== prior behavior).
      # Revert: delete this line and redeploy — code default 'rule' restores it.
      - V5_QUERY_GEN=llm
      # CP492 Step 1 (2026-06-02) — card-volume supply lift. Wizard/add-cards
      # under-fill (30 / 17 vs 50-70 target). Measured root: the 8 cell queries
      # all share the full center-goal prefix → YouTube returns overlapping
      # results → dedup collapses raw 200 → 68 unique (the supply ceiling).
      # search.list quota is 100 units PER CALL regardless of maxResults, so
      # raising maxResults 25→40 grows the per-query result set (+60% raw) at
      # ZERO added quota (still 8 calls = 801 units) and no extra latency (same
      # 1 call per query, fanout stays sub-second). Measure-first lever before
      # the riskier query-diversification or the TARGET_PICKS cap raise.
      # Revert: delete this line → code default 25.
      - V5_SEARCH_MAX_RESULTS=40
      # CP492 Step 3 (2026-06-02) — card-volume cap raise. After Step 1 lifted
      # unique supply 68→120 (now DEDUP_HARDCAP-bound), the bottleneck moved to
      # the targetPicks slice (30) + Shorts drop: wizard still inserted ~23.
      # Raise the slice to 60 (binByCells over-picks 60×1.5=90 → Shorts drop →
      # ~50-60). MUST raise DEDUP_HARDCAP in lockstep: at targetPicks 60 with
      # ~40% Shorts, 120 unique → ~72 non-short → only just clears 60; 180 gives
      # headroom. Raising targetPicks alone would re-hit the 120 unique wall.
      # No quota change (caps are post-fetch). Latency: a wider dedup keep +
      # bigger binning set — measure fanoutMs stays sub-second post-deploy.
      # Revert: delete both lines → code defaults 30 / 120.
      - V5_TARGET_PICKS=60
      - V5_DEDUP_HARDCAP=180
      # CP494 canary — pool-first backfill gate. Fill cells from the quota-FREE +
      # embedding-FREE video_pool (tsvector, v2_promoted ~1.1k) BEFORE live search;
      # a cell with ≥3 pool candidates drops its live search.list query → quota
      # saved. Covers wizard + add-cards (shared v5 executor). Hot-path safe
      # (timeout + try/catch → full live fallback). Source default v2_promoted.
      # Measure: GCP search.list before/after delta + trace v5_pool_backfill.
      # Revert: delete this line + redeploy → code default false (full live).
      # CP494 Fork-3 REJECTED — V5_POOL_SOURCE=all measured WORSE than the
      # v2_promoted default on a same-mandala A/B (poolOnlyCells 2→1, units
      # 601→701). batch_trend (~28k) floods the ts_rank top-128 with generic
      # centerGoal matches that skew to one cell + lack subgoal overlap, so they
      # DISPLACE the well-distributed v2_promoted rows within LIMIT 128
      # (hybrid-rerank.ts:224). Source left UNSET → code default 'v2_promoted'.
      # Using the 28k pool needs a design change (per-cell tsquery / separate
      # fetch+merge / batch_trend gold-only), NOT this flag — see P1.1.
      # NOTE (CP494 ⑤ Phase C): per-cell tsquery shipped as V5_POOL_MATCH
      # (#854) — the rejection above was measured under GLOBAL match, so
      # batch_trend gets a per-cell re-measurement in Phase C before any
      # deletion decision (data-bad vs read-method-bad still unresolved).
      # CP494 ② supply bridge (⑤ Phase B-pre canary). ONE flag, write+read pair:
      # write = POST /internal/video-pool/promote-from-youtube-videos drains
      # quota-0 Mac Mini supply (youtube_videos) into video_pool as
      # 'yt_promoted' (gold/silver only, create-only); read = v5 poolSources
      # gains 'yt_promoted'. Prod measurement is a sanctioned dev-first
      # EXCEPTION: dev video_pool is empty and batch_trend 29k is prod-only,
      # so ⑤ cannot be measured on dev (same class as the P0 EXPLAIN read).
      # Revert: delete this line + redeploy → code default false (bridge
      # no-op + poolSources unchanged). Off after measurement window.
      # CP494 ⑤ Phase B (measurement window — flags off after ⑤ decision).
      # Baseline ①: avg 7.95 live calls/req, pool 1.5/8 cells, req_live_zero=0.
      # Read via video_discover_traces (V3_TRACE_ENABLED already on) —
      # poolOnlyCells / liveCells / quotaUnitsApprox per request.
      # per_cell: each cell's own tsquery top-N (kill displacement, #854).
      # Revert: delete these 3 lines + redeploy → code defaults restore
      # global match / no reuse write / no cell skip.
      # reuse loop (#852): picked live discoveries upsert back to pool
      # (source='user_live') + poolSources reads them next request.
      # full-cell skip (#853): cells with >=12 grid cards skip pool+live search.
      # CP497 isolated re-enable — cell skip ONLY; all pool flags stay OFF.
      # Incident-independent: removes queries upstream of the pool gate,
      # injects no content. Canary: trace v5_skipped_full_cells + quota delta.
      # Revert: delete this line + redeploy → code default false (search all).
      - V5_CELL_SKIP=true
      # CP499+ flag-pair fleet-ON (James [GO] 2026-06-11): EN-drop and
      # pool-serve activate TOGETHER so users see "English becomes Korean",
      # never "English becomes empty cells". Canary run 31a4017d on the K8s
      # mandala: 0 residual empty cells, 7/7 inserts relevance>=60 + Korean
      # (pool passed 0 — gate fail-closed as designed; live carried the fill).
      # No retroactive cleanup: existing mandalas untouched, new wizards only.
      # Rollback = flip BOTH back (false / delete line) + redeploy, no revert.
      - V5_KO_EN_TITLE_DROP=true
      - V5_POOL_SERVE=true
      # CP500+ diversity guard (UX 원칙 2 다양성 축, James-approved 2026-06-12).
      # Same-channel series episodes collapse to the latest one (measured:
      # Basphere "[Kubernetes 6주 코스]" 5-1/5-2/6-2 all placed on cca14d65);
      # the 3rd+ card of one channel per cell is DEMOTED, never dropped (soft
      # — a single-channel thin-supply cell keeps everything; 빈 셀 불허 정합).
      # Applies to v5 placement + pool-serve + live fallback. Knobs:
      # V5_SERIES_DEDUP_SIM (0.8) / V5_CHANNEL_SOFT_CAP (2 = demote from 3rd).
      # Revert: delete this line + redeploy → code default false (기존 동작).
      - V5_DIVERSITY_GUARD=true
      # CP500++ (2026-06-18, James [GO]) — restore the min-view floor on the
      # wizard/auto-add path. #804 (2026-05-30) switched the wizard v3→v5; the v3
      # quality gate (filterByQualityGate, MIN_VIEW 1000) was NOT carried into v5,
      # so live-search niche topics admit garbage (measured: a new "Claude Code"
      # mandala had a 5-view card). The #922 view gate already exists at the
      # placeAutoAddedCards chokepoint (auto-add passes applyViewGate:true) — this
      # just sets its floor. Measured on the offending mandala: 1000 cuts 37% (the
      # <1000 garbage), every cell keeps >=2 cards (no empty cell). rec_cache
      # view_count null=0% (7d) so the gate input is reliable (no meta-enrich
      # needed). NULL view = fail-open. Revert: set 0 (or delete) → no-op default.
      # pool-serve does NOT yet pass applyViewGate (places ~0 now, fail-closed) —
      # wire it when the pool is reactivated.
      - AUTO_ADD_MIN_VIEW_COUNT=1000
      # Wizard redesign Phase 1 activation (2026-04-22).
      # Flips embedGoalForMandala from Mac-mini Ollama to OpenRouter's
      # hosted Qwen3-Embedding-8B. Same model family and 4096d so the
      # existing 18,009 mandala_embeddings rows are reused as-is. See
      # docs/design/wizard-service-redesign-2026-04-22.md §7 Phase 1
      # for the Phase 1 verification gate + rollback triggers.
      # Revert: delete this line and redeploy — code default 'ollama'
      # restores the pre-Phase-1 behavior bit-identically.
      - MANDALA_EMBED_PROVIDER=openrouter
      # CP504 — race the wizard goal embed across BOTH providers (OpenRouter +
      # Mac Mini Ollama qwen3-embedding:8b), first success wins. Removes the
      # OpenRouter-credit single point of failure (the 402 wizard outage): cloud
      # wins on speed in the common case, Mac Mini survives the race if cloud
      # dies. Config-only rollback: delete this line → code default false →
      # the MANDALA_EMBED_PROVIDER selector above.
      - MANDALA_EMBED_RACE=true
      # Mac Mini deprecation Phase D1 (2026-05-13) — flip iks-scorer
      # embedBatch from Mac-mini-first-with-OpenRouter-fallback to
      # OpenRouter-only. Removes a Mac Mini dependency for ~4 call sites
      # (ensureMandalaEmbeddings, v3 semantic gate, iks-scorer Phase 2b
      # goal_relevance, batch-video-collector, v2 video-embedder).
      # Already-supported flag (connection-url.ts comment for full spec).
      # Revert: delete this line → falls back to ollama-first behaviour.
      # See docs/design/mac-mini-deprecation-2026-05-13.md §4 Phase D1.
      - IKS_EMBED_PROVIDER=openrouter
      # CP416 (2026-04-22) — restore the LoRA action-fill path. Without
      # this, generateMandala() called config.mandalaGen.model=undefined,
      # Ollama /api/generate returned 400, LoRA threw, and the Haiku
      # fallback shipped short truncated JSON → 0 cellsFilled on prod
      # mandala 70ef45d9. Mac mini Ollama has `mandala-gen:latest`
      # loaded (verified via /api/tags). Non-secret per CP392: model
      # tag is stdout-safe / open-source-safe. Revert: delete this
      # line → LoRA auto-falls back to Haiku (pre-fix state).
      - MANDALA_GEN_MODEL=mandala-gen:latest
      # CP423 (2026-04-24) — Rich Summary feature flag ON for prod smoke.
      # Metadata-only mode: CAPTION_SOURCE stays at default 'disabled', so
      # no direct YouTube caption API calls from prod per user directive.
      # rich summary falls back to description+title+channel metadata for
      # chapters/quotes generation (empty arrays expected, tl_dr always).
      # Quota per-tier (free=30 / pro=200 / lifetime=admin=unlimited) enforced
      # inside enrichRichSummary via rich-summary-quota module.
      # Revert: delete this line → feature no-ops.
      - RICH_SUMMARY_ENABLED=true
      # CP437 (2026-04-29) — Operator flip: enable v2 layered cron.
      # Default in code is `false` — cron stays dormant unless this env is
      # explicitly true. With this set, `startRichSummaryV2Cron()` schedules
      # the daily 17:00 UTC tick (= 02:00 KST) per
      # `RICH_SUMMARY_V2_CRON_SCHEDULE` (also default-able here).
      #
      # Behavior:
      #   - Each tick picks `RICH_SUMMARY_V2_BATCH_SIZE` candidates (default 50)
      #     via Track A (v1 regen) → Track B (new generation).
      #   - Serial LLM calls (1 in-flight) so the user-facing wizard path
      #     keeps OpenRouter rate-limit headroom.
      #   - Failures: 1 retry, then quality_flag='low' permanent (spec §7-D).
      # Tuning knob, not a secret (CP392 2-question test passes).
      # Revert: set to false or delete this line → cron stops at next process
      # restart (no in-flight call is interrupted).
      # CP475+ (2026-05-20) — ENABLED for service-path runtime backfill.
      # CP437 freeze was a temporary cost-control measure; cron is service-only
      # (prod user-facing enrichment) so the §"LLM API 호출 금지" rule
      # (dataset/experiment/test) does not apply. Track A2 (PR #693/694) now
      # retries pending/low rows on a 12h cooldown so this can stay on.
      #
      # CP488+ (2026-05-26) — DISABLED. The cron path calls generateRichSummaryV2
      # WITHOUT transcript (rich-summary-v2-cron.ts:202) and the provider
      # (openrouter/qwen/qwen3-30b-a3b) produced broken segments — unsorted
      # atom timestamps, narrator-perspective summaries, back-half of the
      # video uncovered. 491 prod rows marked `quality_flag='qwen3_low'`.
      # Re-enable AFTER (a) cron path captioner integration ships AND
      # (b) the LLM provider is swapped to Sonnet 4.6 in the v2 path.
      - RICH_SUMMARY_V2_CRON_ENABLED=false
      # CP504 (2026-06-26) — v2 enrich LLM: Sonnet 4.6 → DeepSeek V4-Flash.
      # 15-cell eval matched atom richness + timestamp coherence (SNAP-clean,
      # PR #976 gate unchanged) at ~1.5% of Sonnet cost ($0.0016 vs $0.106/card).
      # Config-only rollback: delete this line → code default
      # 'anthropic/claude-sonnet-4-6'. cost_usd recorded via PR #979 pricing entry.
      - RICH_SUMMARY_V2_MODEL=deepseek/deepseek-v4-flash
      # CP504 §0.3 D3 — book gate: absolute rel>=40 (93% no-op) → per-mandala
      # median+ ∧ floor35. Validated sim: 60% pass, tie-pass protects tight
      # clusters. PASS_NULL stays true (NULL 79% keep current behavior until D4
      # backfill = half-activation, intended). Scoring unchanged; single call
      # site (fill-book). Config-flip rollback = delete this line → 'absolute'.
      - BOOK_GATE_MODE=relative
      # CP504 §4.5.1 — narrative book (skeleton + chapter-body weave). Activates
      # PR #993 (merged flag-off). fill-book reconstructs cells' §1⑤ topics into a
      # narrative book (기승전결, cross-cell, chapter intro) via Sonnet, and the
      # note-mode sidebar renders book.chapters directly. Config-flip rollback =
      # delete this line (or =false) → legacy cell=chapter. Adds N+1 Sonnet calls
      # per book-fill (skeleton + per-chapter body); cost ~$0.25/book (§7.5).
      # CP504 ACTIVATION — narrative note pipeline ON for James a/b/c/d verdict.
      # =true: fill-book builds the narrative book (skeleton + woven body) + note
      # renders book.chapters / woven prose / atom citations. Rollback = =false.
      - BOOK_NARRATIVE_SKELETON=true
      # CP504 loop-2 enrich ON — research(STORM)+factcheck. EXTERNAL CSE+Haiku per
      # book-fill (≤6 CSE gaps + ≤24 factcheck atoms; RPT-5). Produces references[]
      # + 보강 자료 + section.verification proposals. Rollback = =false (narrative
      # stays on, enrich off). Both flip together for the full a/b/c/d test.
      - BOOK_ENRICH_ENABLED=true
      # CP505 [CV-NOTE-WIRE] ACTIVATION — note targeted-CV ON. fill-book enqueues
      # NOTE_CV_ENRICH (Haiku detect ≤8 → Mac Mini /numerize → RunPod YOLO+Qwen →
      # section.figures; equation→KaTeX, chart/table/diagram→img). ★ REQUIRES at
      # fill time: RunPod (Qwen3-VL :8000 + YOLO :8080) UP + Mac Mini slidegen
      # :8077 in http mode + SNAPSHOT_SERVICE_TOKEN set — else /numerize → [] (graceful
      # no-op, no figures). Async ~148s/ts. Cache = video_figure_snapshots. Rollback = =false.
      - VISUAL_CV_ENABLED=true
      # CP500++ CONFIG-SSOT (2026-06-16) — MIGRATED from deploy.yml→.env to compose
      # (single SSOT; removes the §10-C dual-channel where compose silently wins).
      # Values preserved verbatim from prod printenv 2026-06-16 (value-invariant).
      # v2 quality audit/regen cron toggles (config/v2-quality-audit.ts coerces
      # unset→false). Rollback: set false / delete line + redeploy → code default.
      - V2_QUALITY_AUDIT_ENABLED=true
      - V2_QUALITY_REGEN_ENABLED=false
      # CP499 (2026-06-10) — A-stage relevance backfill worker concurrency.
      # Measured: 38-card mandala scored in 38.3s = 38 Haiku calls (~2.3s each) ÷
      # 4 parallel (code default). Raise 4→8 to ~halve to ~19s. Network-bound
      # (worker awaits OpenRouter, no CPU) so 8 is fine on t3.medium 2-vCPU; the
      # real ceiling is OpenRouter per-key 429, not CPU. ISOLATED queue
      # (enrich-relevance-quick ≠ enrich-rich-summary's RICH_SUMMARY_CONCURRENCY),
      # but the OpenRouter key is SHARED — post-deploy must verify 429=0 across
      # ALL OpenRouter paths (merged-gen / summary), not just relevance. Rollback:
      # set 4 (or delete → code default 4) + redeploy. Raise to 12-16 only after
      # measuring 429=0 (for 64+ card mandalas).
      - RELEVANCE_BACKFILL_CONCURRENCY=8
      # CP500+ (2026-06-13, James [GO]) — R1 rubric scoring canary ON. Scoring
      # switches to the R4 3-axis rubric (goal_contribution gate @ BATCH_GATE_GC_MIN
      # default 65). BATCH_GATE_PRUNE stays UNSET (default false) → score/badge only,
      # ZERO card pruning. Canary: James new wizard observes R4 scores render +
      # off-topic cards demoted (gc<65) WITHOUT deletion. PASS → flip BATCH_GATE_PRUNE
      # (separate [GO]). Rollback: delete this line + redeploy → code default false.
      - RELEVANCE_RUBRIC_ENABLED=true
      # CP437 (2026-04-29) — Operator flip: enable YouTube metadata backfill cron.
      # Default in code is `false` — cron stays dormant unless this env is
      # explicitly true. With this set, `startYouTubeMetadataCron()` schedules
      # the daily 18:00 UTC tick (1 hour after the rich-summary v2 tick to keep
      # OpenRouter + YouTube quota windows separated).
      #
      # Behavior:
      #   - Each tick selects up to YOUTUBE_METADATA_BACKFILL_BATCH_SIZE
      #     (default 2,000) youtube_videos rows where metadata_fetched_at IS
      #     NULL, ordered by user_video_states bookmark > recommendation_cache
      #     > view_count DESC.
      #   - Calls videos.list with parts=snippet,contentDetails,statistics,
      #     topicDetails (1 quota unit per 50-id call → ~40 units per 2,000-row
      #     batch, well under the daily 10,000 limit).
      #   - Upserts the new columns: tags[], topic_categories[], has_caption,
      #     default_language, comment_count, metadata_fetched_at.
      #
      # No LLM API call. No commentThreads.list / comments.list (commentCount
      # alone, per the 2026-04-29 user directive).
      #
      # Revert: set to false or delete this line → cron stops at next process
      # restart (no in-flight call is interrupted).
      # CP437 (2026-04-29) — DISABLED per user directive: 무조건적인 API 사용금지.
      # YouTube Data API 호출 차단. 메타데이터는 Mac Mini yt-dlp 경유로만 진행.
      - YOUTUBE_METADATA_BACKFILL_ENABLED=false
      # CP437 (2026-04-29) — pipeline_events round id (paper §6.2 measurement).
      # Round 1 = initial 20 CC-direct samples (avg_M1=0.174, avg_S=0.546).
      # Round 2 = first 1,507-video Mac-Mini-driven batch.
      # Increment on each new measurement batch. Tuning knob, not a secret.
      - PIPELINE_EVENTS_ROUND=2
      # CP424.2 (2026-04-24) — Wizard Precompute Pipeline.
      # Per docs/design/precompute-pipeline.md. Step 1 goal → /wizard-stream
      # fires fire-and-forget `runDiscoverEphemeral` keyed by session_id →
      # Step 3 save (/create-with-data) consumes result into recommendation_cache
      # + cardPublisher.notify → dashboard first card ≤1s. Miss → legacy
      # post-creation pipeline fallback (backward-compat preserved).
      # Table: mandala_wizard_precompute (10min TTL, pg_cron sweep */5 min).
      # Revert: delete this line → feature no-ops.
      - WIZARD_PRECOMPUTE_ENABLED=true
      # CP493 (2026-06-03) — merged structure+queries generation (canary). ONE
      # Haiku call yields the mandala structure AND a searchable per-cell query
      # in a single continuous context, replacing the two disconnected calls
      # (structure-gen at creation + query-gen at fanout). The query inherits
      # the goal-structure reasoning instead of re-interpreting a bare cell
      # label → diverse, non-clustered queries (fixes the near-duplicate
      # clustering noise — a cell filled with same-brand videos). Wizard path
      # only; add-cards unaffected. 3-stage fallback: partial cell coverage →
      # fanout query-gen; merged throw → legacy structure-gen; never dies.
      # Revert: delete this line and redeploy → code default off restores the
      # two-call path bit-identically (no code revert).
      - WIZARD_MERGED_GEN=true
      # W2 activation (CP499+, 2026-06-10, James marker) — prompt-level
      # `/no_think` for Qwen models on top of reasoning:{enabled:false},
      # which some OpenRouter providers ignore (prod: reasoning-only
      # 1024-cap responses + 20-48s calls despite the param). Activation
      # timestamp = the before/after measurement cut (judgment criteria
      # fixed pre-measurement: success = 20-48s band collapse + leak 0 +
      # success-rate non-degraded; hold verdict until dozens of calls).
      # Revert: delete this line + redeploy (code default off, no revert).
      - OPENROUTER_QWEN_NO_THINK=true
      # CP426 (2026-04-25) — Switch pipeline executor from v1 (3 recs/cell,
      # max 24 with channel diversity drop → ~5 actual) to v3 (12/cell target,
      # 96 max). v3 degrades gracefully to Tier 2 when video_pool is empty.
      # Revert: delete this line → falls back to v1.
      - VIDEO_DISCOVER_V3=1
      # CP436 PR-Y0b2 (2026-04-28, Issue #543) — Center gate flipped back to
      # 'semantic'. 'off' admitted lexical token-overlap matches that
      # produced "Google One AI 프로젝트 시작하기" → 129 무관 카드,
      # "건강습관 만들기" → 109 무관 카드 (CP436 prod incident).
      #
      # CP418 56s blocking (semantic embed-on-titles) is mitigated by:
      #   1. V3_SEMANTIC_MAX_CANDIDATES=30 below (caps single-batch size)
      #   2. embedding.ts:DEFAULT_EMBED_CHUNK_SIZE=50 (single chunk for 31 texts)
      #   3. PR #550 OpenRouter fallback (Mac-mini outage absorbed)
      # Combined: semantic gate completes in ~5-10s vs 56s pre-mitigation.
      #
      # Revert: set to 'off' (or delete this line — code default 'substring').
      - V3_CENTER_GATE_MODE=semantic
      # CP436 PR-Y0b2 — semantic gate candidate cap.
      # 2026-05-14: raised 30 → 100 per direct user directive after "8구단
      # 드래프트" mandala trace analysis revealed 750 raw → 30 cap → 18
      # mandala_filter input → 6 final cards. Cap was the dominant
      # bottleneck (1500 quota units yielded only 6 cards). Trade-off: the
      # embedBatch single-chunk safety (DEFAULT_EMBED_CHUNK_SIZE=50) is now
      # exceeded — embedding.ts will chunk into 2-3 batches, adding ~1-2s
      # latency. Acceptable for the candidate-pool expansion gain.
      # Rollback: set back to 30.
      - V3_SEMANTIC_MAX_CANDIDATES=100
      # CP436 PR-Y0d (Issue #543) — bypass mandala-filter and trust YouTube's
      # search.list ranking. User feedback (2026-04-28): the 9-axis filter
      # actively degraded card quality vs the original YouTube-only path
      # (e.g. "Google One AI 프로젝트" → 109 token-overlap matches in Nvidia
      # NIM / MLOps / Intel oneAPI…). With this flag, candidates emit in
      # YouTube's native order, distributed to cells via cellIndexHint set
      # by v2/keyword-builder. centerGateMode and semantic cap above stay
      # configured but become no-ops for the Tier 2 path while this is true.
      # Revert: delete this line → re-enable applyMandalaFilter.
      # CP455 2026-05-13 — re-enabled (deleted) per unified semantic-gate design.
      # mandala-filter 의 token-jaccard noise (PR #555 도입 이유) 는 V3_CENTER_GATE_MODE=semantic
      # 활성으로 해결 (cosine center gate ≥ 0.35 + sub gate jaccard for cell-assign).
      # OR-tsquery keyword expansion (commit 2ad5da3d) 노이즈도 본 PR 에서 함께 비활성.
      # PR #612 (CP455, 2026-05-13) — YT-Navigator hybrid retrieval activation.
      # Cohere rerank-multilingual-v3.0 cross-encoder + tsvector keyword
      # expansion. Stacks on top of v3 executor (post mandala-filter / pre
      # upsertSlots). Designed to address Issue #610 (medical-English
      # oversaturation / Chinese cards / off-domain channels). Cohere key
      # comes via deploy.yml secret sync (COHERE_API_KEY → .env).
      - V3_ENABLE_HYBRID_RERANK=true
      # PR #617 (CP455, 2026-05-13) — Mac Mini deprecation Phase D1-b.
      # Trend-collector keyword extraction routes through OpenRouter race
      # path instead of Mac Mini Ollama first (background cron only — not
      # on the wizard critical path).
      - TREND_EXTRACT_PROVIDER=openrouter
      # QW-2/QW-4 (CP426): recency 편향 감소 + search timeout 확장
      - V3_RECENCY_WEIGHT=0.05
      - V3_YOUTUBE_SEARCH_TIMEOUT_MS=3000
      # CP436 PR-Y0g (Issue #543) — Tier 0 RedisProvider kill switch.
      # Prod incident: mandala 1ee990a9 ("감정 컨트롤 하기") produced 96 cards
      # in cell 2 alone, 100% rec_reason='cache' from RedisProvider. Domain
      # breakdown:
      #   ~30 한글 속기, ~30 마케팅/홍보, ~25 자각몽/루시드드림, ~5 한복.
      # Zero of the 96 were emotion-management content.
      #
      # Root cause: redis-provider.ts:179-203 matches sub_goal tokens against
      # topic-slug parts via simple overlap (≥1 for single-token slugs, ≥2
      # otherwise), then admits up to 30 videos per matched slug with
      # `relevanceScore` HARDCODED to 0.5 (no quality gate). Korean tokens
      # are broad enough that any sub_goal hits multiple unrelated slugs.
      # The 96-budget was exhausted by cell 2's first matched slugs, leaving
      # cells 0/1/3/4/5/6/7 with 0 cards each.
      #
      # With Y0g default `false`, executor.ts:200-260 + executor.ts:1341-1389
      # skip RedisProvider. Combined with Y0e (Tier 1 off), effective pipeline
      # is Tier 2 YouTube only — matches CP436 user feedback "초기 youtube-only
      # 가 가장 좋음".
      #
      # Re-enable path: V3_ENABLE_REDIS_PROVIDER=true ONLY after a quality
      # gate is in place (semantic cosine threshold + raised minOverlap +
      # MAX_VIDEOS_PER_TOPIC ≤ 5). Do NOT re-enable without that gate.
      # Default = false; this line is a redundancy/clarity guard.
      - V3_ENABLE_REDIS_PROVIDER=false
      # CP436 PR-Y0e (Issue #543) — Tier 1 video_pool cache REVERTED to off.
      # Original Y0b1 enabled PoolProvider (pgvector cosine on 3,121
      # video_pool_embeddings rows) hoping to add semantic recall to
      # YouTubeProvider lexical results. Prod measurement (mandala
      # 69b4e729 "일일 공부 습관 만들기"):
      #   - rec_reason='cache' (PoolProvider) = 11/12 in cell_index=1,
      #     all "시민참여 프로그램" (cosine ~0.5 against keyword
      #     "최적의 공부 환경 구축"). Pure noise.
      #   - 100% of cards in this mandala were rec_reason='cache' —
      #     YouTube's own ranking was buried by video_pool noise.
      # Root cause:
      #   (1) video_pool 3.1K covers ≪ user mandala domains
      #   (2) cache-matcher.ts:22 DEFAULT_RELEVANCE_THRESHOLD=0.3 admits
      #       cosine ≥ 0.3, which is "barely closer than random"
      # Revert leaves executor.ts:254 returning empty tier1Matches —
      # YouTubeProvider becomes the sole source, restoring CP385-era
      # quality (user feedback: "초기 youtube-only 가 가장 좋음").
      # Re-enable path: video_pool ≥ 30K rows + threshold raised to 0.5+.
      # CP455+ (2026-05-13) — re-enabled per unified semantic-gate design.
      # video_pool now 11,242 rows (batch_trend 10,044 + v2_promoted 1,198);
      # mandala-filter + Cohere rerank backstop low-quality cache hits.
      - V3_ENABLE_TIER1_CACHE=true
      # CP455+ (2026-05-13) — Tier 2 search.list quality gate ON.
      # Statistical threshold: age > 30d + < 1K views ≈ bottom 70-80%
      # (YouTube long-tail) — typical AI-generated / advertorial pattern.
      # minViewsPerDay=33 → 30-day cutoff ≈ 1K views (user hypothesis).
      - V3_ENABLE_QUALITY_GATE=true
      - V3_MIN_VIEWS_PER_DAY=33
      # CP457 (2026-05-13) — domain idempotency fix per ssh-connect prod
      # CP458: batch_trend REMOVED from Tier 1 sources. EXPLAIN ANALYZE +
      # per-mandala measurement on prod: with batch_trend the matchFromVideoPool
      # cosine scans ~8.5k ko embeddings × 8 cells → 45-100s per run (the
      # dominant wizard→dashboard latency). v2_promoted alone (1,156 ko rows)
      # → ~0.3-2.7s for the SAME effective coverage: ko mandala 079148c3
      # measured 37 rows/8 cells (v2_promoted) vs 40 rows/8 cells (+batch_trend)
      # — +batch_trend bought 3 extra rows at a 16x latency cost. v2_promoted
      # is also the cache-matcher.ts code default (batch_trend = untriaged
      # cross-domain noise). Restructured query (eligible CTE first) makes the
      # source filter actually shrink the cosine scan.
      # Rollback: append ,batch_trend — but expect 45-100s Tier 1.
      - V3_TIER1_SOURCES=v2_promoted
      - V3_SEMANTIC_MIN_COSINE=0.5
      # CP457+ — per-step request/response capture for video-discovery
      # (LLM prompts, YouTube search, Cohere rerank, embeddings, results).
      # Writes to public.video_discover_traces (TTL 7d). Fire-and-forget;
      # DB outage never blocks user pipeline. Off → near-zero overhead.
      # Disable: set false (or remove line) → code default off.
      - V3_TRACE_ENABLED=true
      # OPENROUTER_EMBED_MODEL defaults to `qwen/qwen3-embedding-8b` in
      # code. Uncomment + override here ONLY if the exact OpenRouter
      # model id string differs (verify at https://openrouter.ai/models).
      # - OPENROUTER_EMBED_MODEL=qwen/qwen3-embedding-8b
      # CP451 (2026-05-12) — raise Prisma pool 5 → 15 to fix wizard
      # tx_total bimodal gap (p50 3.9s, max 8.3s) caused by Supabase
      # transaction pooler slot exhaustion. Background hot path
      # (`UPDATE youtube_videos SET transcript_fetched_at`) takes 3-5s
      # per call × 10+ concurrent, saturating the default 5-slot pool;
      # wizard `$transaction` then waits for a free slot.
      # Evidence: same user 60s gap delta = 12×, `pool_limit=5` in
      # `[prisma-init]` log, `[prisma-slow-query]` shows 10× UPDATE 3-5s.
      # Code default is `DEFAULT_POOL_LIMIT=5` (src/modules/database/
      # connection-url.ts:21) — this env override raises ceiling to 15.
      # Safety: `MAX_POOL_LIMIT=50` enforced at connection-url.ts:23,
      # Supabase transaction pool quota ≫ 15. Tuning knob, not a secret
      # (CP392 2-question test: pool size is stdout-safe / OSS-safe).
      # Revert: delete this line → code default 5 takes over on redeploy.
      - PRISMA_POOL_LIMIT=15
    volumes:
      - cache_data:/app/cache
      - logs_data:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - insighta-network

  # ---------------------------------------------------------------------------
  # Redis — video dictionary serving (CP395). Published only on the host's
  # Tailscale interface; not exposed on public SG.
  # ---------------------------------------------------------------------------
  redis:
    build:
      context: ./docker/redis
      dockerfile: Dockerfile
    image: insighta-redis:local
    container_name: insighta-redis
    restart: unless-stopped
    ports:
      - "${INSIGHTA_TAILSCALE_IP}:6379:6379"
    env_file:
      - .env
    environment:
      - REDIS_ADMIN_PASSWORD
      - REDIS_COLLECTOR_PASSWORD
      - REDIS_INSIGHTA_PASSWORD
      - REDIS_INSIGHTA_UPSERT_PASSWORD
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --user admin -a \"$$REDIS_ADMIN_PASSWORD\" ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2200M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - insighta-network

  # ---------------------------------------------------------------------------
  # Frontend (React/Vite with Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/jk42jj/insighta-frontend:latest}
    container_name: insighta-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - API_URL=http://api:3000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8081/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - insighta-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  cache_data:
    driver: local
  logs_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  insighta-network:
    driver: bridge
