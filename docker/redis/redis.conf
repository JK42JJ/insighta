# Insighta Redis — video dictionary serving.
# ACLs: loaded separately via --aclfile at container start (see entrypoint.sh).

bind 0.0.0.0
protected-mode yes
port 6379

# Memory
maxmemory 2gb
maxmemory-policy noeviction

# Persistence
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB (secondary safety net)
save 3600 1
save 300 100
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

dir /data

# Logging
loglevel notice
logfile ""

# Limits
timeout 0
tcp-keepalive 300
tcp-backlog 511
databases 16
