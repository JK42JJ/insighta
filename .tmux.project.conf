# =============================================================================
# Insighta - Project tmux config (Console IDE)
# =============================================================================
# Loaded by scripts/tmux-agents.sh
# =============================================================================

# --- Catppuccin Mocha Status Bar ---
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'
set -g status-position bottom
set -g status-left-length 50
set -g status-right-length 120
set -g status-left '#[fg=#1e1e2e,bg=#89b4fa,bold]  INSIGHTA #[fg=#89b4fa,bg=#313244,nobold] #S #[fg=#313244,bg=default] '
set -g status-right '#[fg=#45475a]#[fg=#bac2de,bg=#45475a]  #(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo "n/a") #[fg=#313244,bg=#45475a]#[fg=#f38ba8,bg=#313244] +#(cd #{pane_current_path} && git diff --stat 2>/dev/null | tail -1 | grep -oE "[0-9]+ file" | grep -oE "[0-9]+" || echo "0") #[fg=#1e1e2e,bg=#313244]#[fg=#cdd6f4,bg=#1e1e2e] %H:%M '

# --- Window Tab Styling ---
set -g window-status-format '#[fg=#6c7086] #I:#W '
set -g window-status-current-format '#[fg=#1e1e2e,bg=#cba6f7,bold] #I:#W #[fg=#cba6f7,bg=default]'
set -g window-status-separator ''

# --- Pane Styling ---
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'
set -g pane-border-status top
set -g pane-border-format ' #{?pane_active,#[fg=#89b4fa bold],#[fg=#6c7086]} #{pane_index}: #{pane_title} '

# --- Mouse ---
set -g mouse on

# --- Pane Navigation (Alt + arrows, no prefix) ---
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Pane Resize (Alt + Shift + arrows) ---
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 3
bind -n M-S-Down resize-pane -D 3

# --- Quick Zoom ---
bind -n M-z resize-pane -Z

# --- Reload Config ---
bind r source-file .tmux.project.conf \; display-message "  Config reloaded"

# =============================================================================
# Tool Popups (prefix + key)
# =============================================================================
# g = lazygit | f = yazi | B = btop | D = lazydocker
# / = fzf grep | p = fzf file | h = htop-lite
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind f display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi"
bind B display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "btop"
bind D display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazydocker"

# fzf code search → open with bat preview
bind / display-popup -d "#{pane_current_path}" -w 90% -h 90% -E \
  "rg --color=always --line-number --no-heading --smart-case '' | \
   fzf --ansi --delimiter : \
       --preview 'bat --style=numbers --color=always --highlight-line {2} {1}' \
       --preview-window 'right,60%,+{2}-10' \
       --bind 'enter:become(echo {1}:{2})'"

# fzf file picker with bat preview
bind p display-popup -d "#{pane_current_path}" -w 90% -h 90% -E \
  "fd --type f --hidden --follow --exclude .git | \
   fzf --preview 'bat --style=numbers --color=always {}' \
       --preview-window 'right,60%'"

# Quick shell popup (for one-off commands)
bind S display-popup -d "#{pane_current_path}" -w 80% -h 60% -E "zsh"
