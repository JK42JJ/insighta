# =============================================================================
# TubeArchive - Project-specific tmux configuration
# =============================================================================
# Loaded automatically by scripts/tmux-agents.sh
# =============================================================================

# Status bar
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'
set -g status-left-length 40
set -g status-right-length 80
set -g status-left '#[fg=#1e1e2e,bg=#89b4fa,bold] TUBE #[fg=#89b4fa,bg=#313244] #S #[fg=#313244,bg=default] '
set -g status-right '#[fg=#6c7086]%H:%M #[fg=#45475a]| #[fg=#a6adc8]#(cd #{pane_current_path} && git branch --show-current 2>/dev/null) #[fg=#45475a]| #[fg=#f38ba8]#(cd #{pane_current_path} && git diff --name-only 2>/dev/null | wc -l | tr -d " ")M '

# Window/pane styling
set -g window-status-current-style 'fg=#89b4fa,bold'
set -g window-status-style 'fg=#6c7086'
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# Pane labels
set -g pane-border-status top
set -g pane-border-format ' #{?pane_active,#[fg=#89b4fa bold],#[fg=#6c7086]} #{pane_index}: #{pane_title} '

# Mouse support
set -g mouse on

# History
set -g history-limit 50000

# Quick pane navigation (Alt + arrow keys, no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Quick resize (Alt + Shift + arrow keys)
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 3
bind -n M-S-Down resize-pane -D 3

# Quick toggle between main and sub-agent pane
bind -n M-z resize-pane -Z

# Reload this config
bind r source-file .tmux.project.conf \; display-message "Config reloaded"
